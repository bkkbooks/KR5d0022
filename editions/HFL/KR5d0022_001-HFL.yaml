front:
  text: 周易參同契發揮卷之一
  hash: sha256:291bd20aabc30d4e656a2f4c963a2e32fe57502d77b10c0f60a1538740173b46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0022_HFL_001-001a, image: hfl/0625/0625-018.png}
body:
  text: 林屋山人全陽子俞琰述上篇第一乾坤者易之門户衆卦之父母闔尸謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通此乾坤所以爲易之門户也乾生三男坤生三女男女構精萬物化生此乾坤所以爲衆卦之父母也夫人之一身法天象地與天地同一陰陽也人知此身與天地同一陰陽則可與論還丹之道矣坎離匡郭運轂正軸坎月也離日也日月行於黄道晝夜往來循環無窮如匡郭之周遭也轂猶身也軸猶心也欲轂之運必正其軸修還丹者運吾身中之日月以與天地造化同途不正其心可乎牝牡四卦以爲橐籥覆冒陰陽之道猶御者之執銜轡有準繩正規矩隨軌轍處中以制外數在律歷紀月節有五六經緯奉日使兼并爲六十剛柔有表裏朔旦屯直事至暮蒙當㝊晝夜各一卦用之依次序旣未至昧爽終則復更始乾純陽牡卦也坤純陰牝卦也坎陰中有陽離陽中有陰牝牡相交之卦也丹法位乾坤於上下列坎離於東西而乾坤之闔闢坎離之往來儼如橐籥之狀故曰牝牡四卦以爲橐籥橐籥者虚器也橐即鞴囊籥其管也老子道德經云天地之間其猶橐籥乎虚而不詘動而愈出蓋太虚寥廓猶橐籥之體氣之闔闢往來猶橐籥之用知此則還丹之道思過半矣然是道也操則存舍則亡故必愼汝内閑汝外有如列子沖虚至德眞經所謂泰豆氏之御然後可以從事於此蓋泰豆氏之御也齊輯乎轡銜之際而急緩乎唇吻之和正度乎胸臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進退履繩墨而旋曲中規矩鍊丹之法亦猶是也數在律歷紀者巡行十二位應律之十二聲歷之十二月紀之十二年也月節有五六者以一月三十日分爲六節也經乾坤南北之定位也緯坎離東西之妙用也奉日使者奉日之所使也其候與天同運隨日升沉無少異也兼并爲六十者易有六十四卦除乾坤坎離四卦之外恰有六十卦一日十二時用兩卦直事每一爻當一時兩卦計十二爻應律歷紀之數以一月三十日并之共得六十卦也以六十卦布於一月三十日内則朔日朝爲屯暮爲蒙晝夜十二時恰應兩卦十二爻之數自此朝需暮訟朝師暮比依次而用以至晦日用旣濟未濟晦朔循環周而復始其間卦象内外剛柔之體或反或對皆不必執泥也張紫陽悟眞篇云此中得意休求象若究群爻謾役情蓋非眞以六十卦布於一月三十日之内也或者不悟此理惟執泥卦象之說乃謂日用兩時爲火候從而準則銖爻推測氣候汲汲焉日視土圭夜瞻刻漏豈不大謬哉日辰爲期度動靜有早晚陳泥丸翠虚篇云天上分明十二形人皆分作鍊丹程即日長爲期度之謂也日即火也辰即候也人能以天上之日辰反而求之吾身則日臨之位即時辰也悟眞篇云鍊藥須知昏曉即動靜有早晩之謂也動者日出而作也靜者日入而息也蓋吾一身之中自有日出日入之早晩其火候動靜一一暗合天度即非用天樞潮候而爲下功之時也春夏據内體從子到辰巳秋冬當外用自午訖戌亥卦有六爻下三爻爲内上三爻爲外試即屯蒙二卦眀之朝用屯陽火上升之候也而屯之初九正當身中之子由内而外故曰春夏據内體從子到辰巳暮用蒙陰符下降之候也而蒙之上九正當身中之午由外而内故曰秋冬當外用自午訖戌亥然所謂春夏秋冬子午巳亥與夫内體外用之說皆譬喻也乃若泥象執文而行卦氣則徒自勞苦何益哉賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其序陽氣當春而發生陰氣當秋而肅殺丹法之賞罰亦猶是也永日自寅而東出短日自申而西入丹法之昏明亦猶是也爻辭有仁義隨時發喜怒者潛藏飛躍進退加减各隨其時也薛紫賢復命篇云火候抽添思絶塵一爻纔過一爻生陰文陽武依加減减一顆還丹火裏成豈眞有所謂卦爻哉他如賞罰昏明仁義喜怒與夫四時五行之說皆譬喻也天地設位而易行乎其中矣一高一卑天地之位也一陰一陽天地之易也陽生於子自子丑寅卯而極於巳積一百八十日而陰又生陰生於午自午未申酉而極於亥積一百八十日而陽又生陰生陽陽生陰陰復生陽陽復生陰陰陽相生循環無窮是之謂易是易也天地有之人身亦有之豈不聞悟眞篇云先把乾坤爲鼎器次摶烏兔藥來烹此豈謂身外之乾坤身外之烏兔哉學者當求之於身中可也今夫天位乎上地位乎下二氣則運行乎其中一升一降往來不窮猶橐籥也人受冲和之氣生於天地間與天地初無二體若能悟天地橐籥之妙此心冲虚湛寂自然一氣周流於上下開則氣出闔則氣入氣出則如地氣之上升氣入則如天氣之下降自可與天地齊其長久子華子云古之知道者築壘以防邪䟽源以毓眞深居靜處不爲物攖動息出入而與神氣俱魂魄守戒謹窒其兊專一不分眞氣乃存上下灌注氣乃流通如水之流如日月之行而不休陰營其藏陽固其府源流泏泏滿而不溢冲而不盈夫是謂之久生捨此而曰我自有登雲捷法則是旁蹊曲學非吾大丹之道也天地者乾坤之象也設位者列陰陽配合之位也易謂坎離坎離者乾坤二用二用無爻位周流行六虚往來旣不定上下亦無常乾爲天坤爲地吾身之鼎器也離爲日坎爲月吾身之藥物也先天八卦乾南坤北離東坎西南北列天地配合之位東西分日月出入之門反而求之吾身其致一也乾坤其體也坎離其用也坎離二者周流升降於六虚往來上下蓋無爻位吾身之坎離運行乎鼎器之内潛天而天潛地而地亦豈有爻位哉幽潛淪匿變化於中幽潛淪匿者神入氣中氣入臍中而沉歸海底去也變化於中者時至氣自化靜極機自發而抱出日頭來也陳希夷指玄篇云邈無蹤跡歸玄武潛有機關結聖胎此之謂也包裹萬物爲道紀綱悟眞篇云道自虚无生一氣便從一氣産陰陽陰陽再合生三體三體重生萬物昌蓋金丹之母不過先天一氣而已裂而爲二分而爲三散而爲萬皆自此一氣中來故曰包裹萬物爲道紀綱以無制有器用者空道德經云三十輻共一轂當其無有車之用埏垣以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用林鬳齋註云轂車之容軸者也輻輪之股也轂惟虚中故可以行車埏埴陶者之器也虚而圓故可以成器户牖室中之通明處也此三者皆是譬喻虚者之爲用故曰有之以爲利無之以爲用車器室皆實有之利也而其所以爲車爲器爲室皆虚中之用今魏公謂以無制有器用者空實用老子之說蓋丹法以太虚爲鼎爐而太虚之中自有天然妙用奇哉奇哉關尹子云衣摇空得風氣嘘物得水陳抱一註云知摇空得風則鼓吾橐籥可以生氣知嘘物得水則胎吾之氣可以化精苟昩此而他求所謂鼎器則非虚無之道矣故推消息坎離没亡息者進火之候坤三變而成乾也消者退符之候乾三變而成坤也今自朔旦震卦用事之後歷兊至乾望罷巽卦用事之後歷艮至坤其間不見坎離爻位是謂坎離没亡歟曰坎離非没亡也行乎六虚之間而往來不定爾言不苟造論不虚生引驗見效校度神明推類結字原理爲徵坎戊月精離己日光日月爲易剛柔相當土旺四季羅絡始終青赤白黑各居一方皆禀中宫戊己之功坎外陰而内陽月之象也離外陽而内陰日之象也坎納戊戊陽土也離納己己陰土也二土交合則陰陽相濟剛柔相當猶日月兩字合之而輳成易字也青赤白黑即木火金水也木火金水各居一方惟土居中央分旺辰戌丑未而羅絡一歲之始終是故木得之以旺火得之以息金得之以生水得之以止四者皆禀其功也然是土也遍滿乎宇内本無定位焉在坎則爲戊土在離則爲己土在中宫則爲戊己土在四季則爲辰戌丑未土均是物也㫖哉悟眞篇之詩有曰四象五行全藉土又曰只縁彼此懷眞土遂使金丹有返還蓋非眞土調和則陰陽否隔剛柔離分不能成丹也嗚呼魏公作是書以發明斯道之祕無非引驗見效親到實詣之說復恐其說未足以取信於後人遂又校度日月之神明以爲法推原易卦之道理以爲證可謂深切而著明矣又豈肯苟造無稽之言虚生無益之論以誑惑後之來者哉易者象也懸象著明莫大乎日月窮神以知化陽往則陰來輻輳而輪轉出入更卷舒易者象也即上文所謂日月爲易是也夫魏公之爲是說也將以指陳身中之陰陽而身中之陰陽則無形可求百姓日用而不知苟非假象託物將何以發明而使人窮其神知其化哉於是仰觀俯察乎天地之間惟有日月之象顯然著明故以其顯然著明者示人使之洞見天地之陰陽而默識乎神化之妙則吾身之日用不知者自可以不言而喻也蓋日月往來乎黄道之上一出一入迭爲上下互爲卷舒晝夜循環猶如車輪之運轉無有窮已人能反身而思之觸類而長之則吾一身之中自有日月與天地亦無異矣韓逍遥内指通玄祕訣云法輪要轉常須轉只在身中人不見駕動之時似日輪日輪向我身中轉又云法輪轉得莫停留念念不離輪自轉何用外求哉易有三百八十四爻據爻摘符符謂六十四卦一部全易計三百八十四爻一斤大藥計三百八十四銖此丹道易道之相通而參同契所以作也爻者卦畫也符者卦之合體也易有六十四卦丹法以乾坤爲鼎器以坎離爲藥物以其餘六十卦爲火候今以乾坤觀之始於屯蒙終於旣濟未濟其間反體對體無一不相合於此見一陰一陽之謂道而古仙據爻摘符以比喻鼎器藥物火候可謂巧且備矣晦至朔旦震來受符當斯之時天地構其精日月相撢持晦至朔旦者晦朔之間也震來受符者乾交於坤而成震身中之一陽生也斯時神與氣交氣與神合有如天地之構精日月之合璧故曰當斯之時天地構其精日月相撢持天地即吾身之乾坤也日月即吾身之坎離也天地日月以時而相交故能陶萬彙而成歲功乾坤坎離以時而相交故能奪造化而成聖胎魏公恐學者不明身中之陰陽造化遂借日月相交之時爲喻非曰一月止有晦朔之間可以用功也悟眞篇云日月三旬一遇逢以時易日法神功學者能知以時易日之妙則能竊天地之機而成大丹矣雄陽播玄施雌陰綂黄化雄陽播玄施者天氣降而至於地也雌陰統黄化者地承天氣而生物也悟眞篇云甘露降須天地合黄芽生要坎離交蓋丹法之生藥與天地之生物相似皆不過陰陽二氣一施一化而玄黄相交爾渾沌相交接權輿樹根基陰陽二氣上下交接混而爲一故謂之渾沌渾沌乃天地之郛郭萬物之胞胎也丹法以之爲權輿而樹立根基則天地萬物皆在吾身而不用求之外矣經營養鄞鄂凝神以成軀鄞鄂即根蒂也丹法經營於此而回光内照則神戀氣而凝氣戀神而住自然交結成胎如其神光内泄氣馬外馳則日月失道金汞異爐欲望成丹不亦遠乎白紫清珠玉集丹髓歌曰昔日遇師親口訣只要凝神入氣穴此所以稱之爲神丹而號之曰神仙也衆夫蹈以出蝡動莫不由陰陽交接之道乃生生化化之源也不特人舉禽獸由此而出雖蠉飛蠕動跂行喙息至微之類莫不皆然故曰衆夫蹈以出蠕動莫不由是道也施之於人則生人存之於己則生藥但有聖凡逆順之分爾周易參同契發揮卷之一
