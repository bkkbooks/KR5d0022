body:
  text: 林屋山人全陽子俞琰述上篇第三上德無爲不以察求下德爲之其用不休道德經云上德無爲而無以爲下德爲之而有以爲今曰上德無爲不以察求者神守於玄宫而默默無爲也下德爲之其用不休者氣騰於牝府而綿綿不絶也蓋借老子之說以發坎離兩穴之祕也上閉則稱有下閉則稱無無者以奉上上有神德居此兩孔穴法有無亦相須上閉則稱有者離宫有象藏眞水也下閉則稱無者坎户無形隱赤龍也無者以奉上上有神德居者元神栖於本宫則氣皆隨之而升上所以妙在八門牢鎖閉也悟眞篇云長男乍飲西方酒少女初開北地花若使青娥相見後一時關鎖住黄家黄家即上田元神所居之宫也此兩孔穴法有無亦相須者下不閉則火不聚上不閉則藥不升也悟眞篇云送歸土釜牢封閉次入流珠配厮當故必相須而後可也何謂流珠土釜即坎離兩穴之異名也知白守黑神明自來白者金精黑者水基白者金也黑者水也丹法以水爲基而金精生於水中所以知白者惟守其黑守黑則白自現也守之何如即如貓之守窟以待䑕至其身不動其目不瞬而此心惟䑕是務更無他念也神明者天機也如欲盜其機必先虚其心心虚則神凝神凝則息定息定則兩畔同升共一斤而神明自來也離騷遠遊篇云毋滑而魂兮彼將自然壹氣孔神兮於中夜存虚以待之兮無爲之先與此同旨紫陽朱子註云蓋廣成子之告黄帝不過如此實神仙之要訣也水者道樞其數名一陰陽之始玄含黄芽五金之主北方河車故鉛外黑内懷金華被褐懷玉外爲狂夫水者道之樞陰陽之始也何者天一生水居五行之首也水一加以土五是爲水之成數其玄含黄芽之象乎玄含黄芽者水中産鉛也鉛爲五金之主在北方玄冥之内得土而生黄芽黄芽即金華也金華乃鉛之精英故鉛體外黑而金華隱於其中猶至寳藏於褐夫之懷也北方河車即帝車也以其隨天河而輪轉故稱河車今夫眞鉛生於水中得眞火煆鍊而出則河車不敢暫留停運入崘崐峯頂也金爲水母母隱子胎水者金子子藏母胞金生水故曰金爲水母水者金子水中有金故曰母隱子胎子藏母胞學者若知水中金之義則知産藥之川源矣眞人至妙若有若無髣髴大淵乍沉乍浮眞人元神也若有若無者綿綿若存用之不勤也髣髴大淵乍沉乍浮言眞人徃來於大淵微茫髣髴浮沉不定也簫紫虚金丹大成集云崘崐山上黄華路時引元神去復還蓋大淵即崘崐也進退分布各守境隅丹法自子而進自午而退進退分布各守境界不相涉入楊虚白金丹純粹吟云子午爐前分進退乾坤鼎内别浮沉是也採之類白造之則朱白者白金也朱者朱汞也採之類白者採北方坎宫之白金以爲丹母而白金與朱汞乃同類相從者也造之則朱者每日運火抽去鉛氣而添汞於其間也陳默默崇正篇云内守河車居北闕由來天一水爲先合符須得周天火立義還同渡岸船搬運有功連晝夜斡旋至妙體璣璇修丹上士如明此方識眞鉛不用鉛學者徒知以鉛汞交結爲藥而不知抽鉛添汞之火功則雖結丹頭不能免其不耗散也鍊爲表衞白裏貞居鍊爲表衞者眞火運用於外爐也白裏貞居者金丹安處於内爐也内爐有丹須得外爐之火晝夜鍊養然後成熟郝廣寧太古集云頂運驪珠光自現腹藏祕寳粲然安豈非火運於外而丹藏於内哉方圓徑寸混而相扶先天地生巍巍尊高旁有垣闕狀似蓬壺環帀關閉四通踟蹰守禦固密閼絶姦邪曲閣相連以戒不虞方圓徑寸謂泥丸宫也今人但謂心爲方寸殊不知人身三田其中皆虚一寸而氣脉皆相通也混而相扶謂頭有九宫而泥丸居其中黄庭經云泥丸九眞皆有房方圓一寸處此中是也先天地生謂泥丸一穴乃一身萬竅之祖竅此竅開則衆竅齊開也巍巍尊高謂泥丸宫在崐崘峯頂乃元神所居之位上應玄都是萬神會集之鄉也旁有垣闕者七竅旁羅於其外而洞房黄闕皆在其前也狀似蓬壼者猶海上有三神山而蓬萊居其上也環帀關閉者收視返聽而謹窒其兌也四通踟蹰者元和内運一氣流通而朱雀遶瓊臺而翺翔也守禦固密者如龍養珠心不忘如雞抱卵氣不絶也閼絶姦邪者任從魔境侵但自運斤斧也曲閣相連以戒不虞者神若出便收來而雙童長守洞門也可以無思難以愁勞譚長眞水雲集云絲頭莫向靈臺掛内結神胎管得仙蓋心無爲則氣和氣和則至寶結矣心有爲則氣亂氣亂則英華散矣是故可以無思不可以愁勞也神氣滿室莫之能留守之者昌失之者亡動靜休息常與人俱眞積力久太和充溢動靜休息常須謹守守之則昌失之則亡不可須臾離也是非歷藏法内視有所思履斗步罡宿六甲次日辰陰道厭九一濁亂弄元胞食氣鳴腸胃吐正吸外邪晝夜不卧寐晦朔未嘗休身體日疲倦恍惚狀若癡百脉鼎沸馳不得清澄居累土立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心歡而意悦自謂必延期遽以天命死腐露其形骸舉措輙有違悖逆失樞機諸術甚衆多千條有萬餘前却違黄老曲折戾九都三千六百法養命數十家泯泯棼棼不可枝舉有如闔目内視歷五藏以存思履斗步罡按日辰而祭甲是豈金丹之道哉至若行陰者以九淺一深爲火候而致元胞之攪亂食氣者以吐故納新爲藥物而使腸胃之虚鳴坐頑空則苦自晝夜不眠打勤勞則不顧身體疲倦或摇頭撼腦提拳努力於是百脉沸馳而變出癰疽者有之或累土立壇朝祠暮祭於是夜夢鬼交而陷於妖魅者有之始焉此心喜悦自謂必可延期一旦中道夭亡不免形骸腐壞是皆操持悖謬明違黄帝之文舉措乖訛全失老君之㫖執迷不悟以至於此其獲戾也又誰之咎歟是故王良器作破迷歌陳泥丸作羅浮吟歷舉世間旁門諸術之謬滔滔二三千言蓋恐後人不得正傳而錯行邪徑之失也今之學者更能以王陳二公之言過目一遍必當見其失而内自省矣明者省厥㫖曠然知所由魏公作此參同契一書粲然如昏衢之燭昭然如迷海之鍼蓋欲使後之明者因言會意曠然洞達知所以修鍊之由也魏公此心可謂仁矣或者乃視之爲紙上語而更不著眼是誠自暴自棄豈不惜哉勤而行之夙夜不休丘長春鳴道集云不是朝昏坐行功扭捏成蓋修鍊九轉金液大丹與旁門小安樂法不同是必謝絶人事專心致志夜以繼日勤而行之乃能成功彭眞一不云乎志士又須撤聲色去嗜欲棄名利投靈山絶常交結仙友隱密潛修晝夜無怠方可希望或不如是則虚勞動爾眞一此說厥亦明甚或者昩此惟欲日用而時爲久候聞吾晝夜不休之說則莫不驚笑以爲不勝其勞且煩蓋亦弗思甚矣翠虚篇云執著之人得不眞朝行暮輟又非誠切不可輕信日用兩時爲火候之說昔者皇甫履道見王三一置籌壼問曰安用曰欲知子午二正爾曰十二時中當無令間斷何止子午耶要之丹道與天道一也天道有一息不運乎天道無一息不運則丹道詎可有一息間斷哉馬丹陽漸悟集云師恩深重終難報誓死環墻鍊至眞環墻者所以絶人徃來而專心修鍊也服食三載輕舉遠遊跨火不焦入水不濡能存能亡長樂無憂道成德就潛伏俟時太乙乃召移居中洲功滿上昇膺籙受圖修丹只是片餉功夫今曰服食三載何耶翠虚篇云片餉功夫修便現老成須是過三年蓋片餉功夫只是結丹之時而所謂三載者乃一年入室之後更須温養不可遽然遠出也鍾離正陽指玄三十九章云孩兒幼小未成人須藉孃孃養育恩其說是已若過此三載以後則身如煙雲行步如飛可以輕舉可以遠遊大浸稽天而我不溺大旱金石流土山焦而我不熱存亡在我而長樂無憂矣然温養事畢更當潛伏人間積功累德以開度群迷方可翩然而往是故朱靈根囑皇甫履道接引後學金華洞仙戒楊虚白不得幽栖必功濟群品乃仙去豈容獨善其身哉火記不虚作演易以明之古有火記六百篇何其多耶彭眞一還丹金鑰匙云火記六百篇篇篇相似然則所謂六百篇者亦猶六十卦也蓋火記之數小而言之則爲六十卦演而伸之則爲六百篇六十卦爲一月之候而六百篇者十箇月之候也故日火記不虚作演易以明之偃月作鼎爐白虎爲熬樞汞日爲流珠青龍與之俱舉東以合西魂魄自相拘偃月爐鉛爐也其位在坎白虎居之流珠宫汞鼎也其位在離青龍居之白虎爲熬樞者白虎隱丹田而火從臍下發也青龍與之俱者驅青龍下就於白虎也東西即坎離也魂魄即日月也龍虎之出處與鉛汞之所産初無兩途王易玄赤龍大丹訣云若辨龍隨虎兼知汞在鉛學者若知驅龍就虎之祕則知以汞投鉛之說矣復命篇云師指青龍汞配歸白虎鉛兩般俱會合水火鍊經年又云龍虎一交相眷戀坎離纔媾便成胎溶溶一掬乾坤髓著意求他啜取來蓋丹法至簡至易但舉東方青龍之魂以合西方白虎之魄則東西旣無間隔自然龍虎交媾而魂魄相投産紫金也金碧龍虎經王保義註䟽云鍊至藥不出水火水火旣交則鼎内龍虎之氣便相和洽而成金液其說明矣作丹之時苟能虚心靜嘿凝神入於氣穴則東西配合金木交并南北混融水火旣濟而四象五行會聚都在一方凝結又何勞用力哉上弦兊數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾銖有三百八十四亦應卦爻之數上弦之時兊卦用事月生一半之明故曰上弦兊數八下弦之時艮卦用事月生一半之魄故曰下弦艮亦八合兩弦而觀之則乾坤鼎器成立而藥物火候盡在其中矣二八應一斤易道正不傾者月有上下二弦上弦金半斤計一百九十二銖下弦水半斤計一百九十二銖總而計之共得三百八十四銖易有六十四卦卦有六爻陽爻一百九十二陰爻一百九十二總而計之共得三百八十四爻魏公借此以論丹道之妙不過取其陰陽兩齊而配合相當爾蓋非眞有所謂三百八十四銖眞有所謂三百八十四爻也悟眞篇云二八相當自合親陳素陽至道篇云我隱默中調二八蓋二八即是兩箇八兩輕重均平不偏不頗之義若使凖則銖爻而手持念珠數呼吸此乃自取辛苦豈至簡至易之道哉廼若復命篇云方以類聚物群分兩畔同升共一斤金丹大成集云二八門中達者稀弦前弦後正當時蓋謂身中巽門非此上弦八兩下弦八兩之謂也金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從日生朔旦受日符金返歸其母月晦日相包隱藏在匡郭沉淪於洞虚金復其故性威光鼎乃熺世間萬物入火皆壞惟眞金不壞蓋五行相生至金而極而金之爲寶鎔之得水擊之得火其柔象木其色象土水火木土四性俱備故眞金經百鍊而愈堅未嘗失其本體之重自開天闢地以來不知幾千萬年而日月之形如常未嘗虧其明蓋陰陽之精互藏其宅各得其所安故日月之形萬古不變且懸象著明莫大乎日月丹術著明莫大乎金火金即月也火即日也今人但知金爲月之光而不知月之光本生於日也夫月爲太陰本有質而無光其盈虧也以受日光之多少月之朔也始與日合越三日而明生八日而上弦其光半十五日而望其光滿旣望而漸虧二十三日而下弦其虧半三十日而晦其光盡方其朔旦之初與日相離受日之光而生明其體漸白及其晦也則與日相包魄存而光泯其體盡變爲黑今以丹道言之則金本從日生朔旦受日符者太陰眞金生於坤宫本由太陽眞火所化其受氣之初亦猶月受日光自朔旦而始也金返歸其母月晦日相包者金在坤宫與火相守亦猶月晦之夜日月相撢持也隱藏其匡郭沉淪於洞虚者神氣深入乎其根漸漸沉歸海底如月魄之不見也金復其故性威光鼎乃熺者月體本黑受日之光而白今焉與日相包而隱藏其匡郭則復其本體之黑矣但守其黑勿問其白守之之久神明自來俄頃光芒透鼎火力熾盛則三日庚生兌户開黑銀炋出白銀來也子午數合三戊己數稱五三五旣和諧八石正綱紀子水一午火二子午之數合而成三土數五故中央戊己稱五三與五併之則成八故云八石三五旣和諧者水火土三者合爲一也且土尅水水尅火豈和諧者今土爲水火之媒在其間調停配合使水火結爲夫婦所以和諧也八石正綱紀者水火土三者合爲一則綱紀正萬目張矣呼吸相含育佇息爲夫婦陽升陰降天地之呼吸也天地呼吸於其内是以長久人能效天地呼吸於其内亦可與天地同其長久金丹大成集云呼岀心與肺吸入腎與肝呼則接天根吸則接地根呼則龍吟雲起吸則虎嘯風生呼吸風雲凝成金液兹蓋一氣自然之呼吸非口鼻之呼吸也李長源混元寶章云只就眞人呼吸處放教姹女往來飛人能虚心凝神回光内照於眞人呼吸處隨其升降順其自然而存之少焉呼吸相含育兀然自佇則打成一片結爲夫婦也何謂眞人呼吸處廖蟾輝三乘内篇云前對臍輪後對腎中央有箇眞金鼎即眞人呼吸處也黄庭經云後有密户前生門出日入月呼吸存人惟念不到此故呼吸亦不在此莊子南華眞經云眞人之息以踵衆人之息以喉蓋在喉則近而短促其息淺淺接腫則長而綿延其息深深修鍊至於其息深深則我命在我不爲大冶陶鑄矣還源篇云心下腎上處肝西肺左中非腸非胃腑一氣自流通如此明明直指復何疑哉復何疑哉黄土金之父流珠水之母水以土爲鬼土塡水不起朱雀爲火精執平調勝負水盛火消滅俱死歸厚土三性旣合會本性共宗祖土居中央故稱黄土土生金故曰黄土金之父流珠乃汞也以其走動不定故稱流珠流珠入於水中則結成眞金金生水故曰流珠水之母土本生金金本生水今也土入於水中則水爲土所制矣水爲土所制則不能載金而升上故曰水以土爲鬼土塡水不起若得南方朱雀之火猛烹極煆之則火盛水沸其金隨水而上騰矣蓋朱雀乃南方火精執衡司夏今坎水方爲土鬼制伏火能烹而沸之使之升上故曰朱雀爲火精執平調勝負及夫水沸上騰入於南方離宫則離火反爲坎水所尅火爲水尅而消滅則水又不可太濫於是又以土尅水水得土則止故曰水盛火消滅俱死歸厚土水火遇土謂之三性三性旣已會合則混而爲一俱歸於坤宫故曰三性旣合會本性共宗祖也巨勝尚延年還丹可入口金性不敗朽故爲萬物寶術士服食之壽命得長久巨勝胡麻也服之尚能延年金液九轉大還丹乃金精壯盛之時竊取天地正氣以結成聖胎豈不能長生歟又況金性堅剛經萬年而不朽故爲萬物中之至寶宜乎神仙以此爲重所以不曰水火木土之丹而獨名之曰金丹也土遊於四季守界定規矩土無定位周流於辰戌丑未之間在辰爲季春在未爲季夏在戌爲季秋在丑爲季冬春夏秋冬皆是土遊之地故曰土遊於四季土能竭水藏火守於水則水不流守於火則火不焰今以之守於坤而採藥守於乾而運火故曰守界定規矩金砂入五内霧散若風雨金砂之升鼎也穿兩腎導夾脊過心經入髓海衝肺腧度肝歷脾復還于丹田當其升時滃然如雲霧之四塞颯然如風雨之暴至恍然如晝夢之初覺涣然如沉痾之脱體精神冥合如夫婦之交接骨肉融和如澡浴之方起是皆眞景象也非譬喻也復命篇云不知將謂氣得後自然眞蓋非親歷則莫能知之熏烝達四肢顔色恱澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰眞人得丹之後晝夜温養無令間斷則眞氣熏烝達於四肢自然神清氣爽顔色恱澤髮白返黑齒落更生老翁復爲壯夫耆嫗又成姹女自此改形度世跳出樊籠號曰眞人焉抑嘗論之人與天地並立爲三才則與天地相爲終始可也今焉天地無終窮而人生年不滿百何耶蓋人在天地間不過天地間一物爾以其靈於物故特謂之人豈能與天地並哉若夫竊天地之機以修成金液大丹則與天地相爲終始乃謂之眞人旣爲眞人則超凡入聖無復向來之形矣逍遥物外永謝塵世之厄矣胡粉投火中色壞還爲鉛氷雪得温湯解釋成太玄金以砂爲主禀和於水銀變化由其眞終始自相因欲作服食仙宜以同類者植禾當以黍覆雞用其卵以類輔自然物成易陶冶魚目豈爲珠蓬蒿不成檟類同者相從事乖不成寶是以燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下胡粉本黑鉛燒就若投之火中則復還爲鉛氷雪乃陰氣結成若沃以温湯則解化爲水何者返本還元其理不容不然也鍊金之法以砂爲主而和以水銀蓋水銀生於砂中與砂爲同類之物所以終始相因而成變化者由其眞也悟眞篇云竹破須將竹補冝覆雞當用卵爲之萬般非類徒勞力爭似眞鉛合聖機蓋謂眞汞得其鉛則一陰一陽氣類相感是爲同類譬猶植禾當以其黍覆雞必用其卵以類相從則其道自然不勞於力而成變化若使舍其同類而别求他物則猶魚目之不可爲珠蓬蒿之不能成檟類旣不同安有變化亦猶燕生燕雀生雀使之生鳳則不能生矣狐乳狐兔乳兔使之乳馬則不能乳矣火性炎上使之潤下可乎水性潤下使之炎上可乎所以欲作服食仙宜以同類者類同者相從事乖不成寶也然吾身自有一天地自有一陰陽而還源篇乃云奪他天地髓交姤片時中而必須竊取天地之氣乃日月聖父靈母之氣吾身之氣乃骨血凡父母之氣故以眞父母之氣變化凡父母之身爲純陽眞仙則與天地同壽也或人自昩求同類不知自己同乾坤却向身外覓同類妄指童女爲眞鉛遂託黄帝玄素之事飾其邪說以逢士夫之欲於是冨家貴宦行春術而徃徃陷於死亡者有之蓋不特唐相國夏侯孜之一人也是故葛稚川抱朴子以爲水盃盛湯羽苞蓄火陶隱居眞誥以爲抱玉赴火金棺葬狗洞微子目之爲猪狗行狀李玉谿稱之爲地獄種子古今丹書所以皆極口痛駕此術者以其害人而終亦自害其身也南華眞經云無勞爾形無摇爾精乃可以長生未聞有所謂御女之說誰生厲階至今爲梗誣污前眞迷誤後學其旁門諸術中害道之最尤者歟世間多學士高妙負良才邂逅不遭遇耗火亡貨財據按依文說妄以意爲之端緒無因縁度量失操持擣治羌石膽雲母及礜磁硫黄燒豫章泥汞相鍊飛鼓鑄五石銅以之爲輔樞雜性不同類安肯合體居千舉必萬敗欲黠反成癡僥倖訖不遇聖人獨知之稚年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來悟眞篇云饒君聰慧過顔閔不遇眞人莫强猜只爲丹經無口訣教君何處結靈胎蓋世間高才好學之士不爲無人而求其遇眞師得正傳者或寡矣彼有燒鍊三黄四神之藥妄意以爲道在于是殊不知五金八石乃世間有形有質之物其種類不同其性質各異安肯合體而並居哉故凡爲此術者莫不千舉萬敗欲黠成癡何則端緒無因縁度量失操持故也指玄三十九章云訪師求友學燒丹精選朱砂作大還將謂外丹化内藥元來金石不相關蓋神仙金液大還丹乃無中生有之至藥而所謂朱砂水銀者不過設象比喻而已奈何世人不識眞鉛汞將謂凡砂及水銀徃徃耗火費財卒無成功遂至皓首茫然反起虚無之歎嗚呼眞道簡而不繁至言淡而無味人誰信之人誰行之甚至得正傳而中道生疑於是出正入邪蹊者有矣内指通玄祕訣云多恃聰明强是非縱聞法要自相違之人也背大道而守迷路管窺天而不廣見烏足與論方來無窮之玄奥哉周易參同契發揮卷之三
