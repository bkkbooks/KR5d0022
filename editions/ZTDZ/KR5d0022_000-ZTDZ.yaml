front:
  text: 周易參同契發揮序止一參同契乃萬古丹經之祖其辭古奥密微莫可測議然亦未有眞知實踐得其正傳而不能通此者也若其論議與之相戾而曰我自有祕授焉用此爲則亦妄人而已昔者紫陽朱夫子鳴道於淳熙慶元間旁通百氏有異乎吾之說者未嘗隨聲附和而苟同也乃獨愛伯陽之書爲之精研熟究而不自以爲癖有注釋有考異且嘗曰邵子得於希夷希夷源流自參同契又曰眼中見得了了如此但無下手處又曰今始得頭緒未得其作料孔穴及西山蔡先生編置道州夫子送之留寒泉精舍相與訂正是書而竟夕不寐至西山卒又得所謂策數之說恨不得與西山講之居無何而夫子卒矣是書之注蓋行於西山旣没之後而一時門人亦未有及此者故不復有所詢訪其間所未滿意者正不無也石澗俞君玉吾所著發揮三篇蓋所以補空同道士之所不足且以發明彭氏陳氏鄭氏王氏之所未發者旁搜博取無所不至蓋得至人指授非區區訓詁者比予老矣鼎器頽弊藥物耗竭無復有所望矣觀俞君之注釋是書安得不重爲之太息也巖谷之士氣清神全有能得是書以印正焉則於後天而老凋三光者其亦庶幾矣乎遂爲書其篇首而藉是以綴姓名於不朽云朝請郎祕書監兼尚書左右司阮登炳七十七歲書自參同契成書以來近世考亭大儒亦復注脚今觀全陽子所著發揮研精覃思鉤深致遠可謂羽翼是書矣然考亭當時猶有願爲劉安雞犬之望晩年感興之作飄然直有往從脱屣意豈非有得於此書而然耶全陽子它日功成蟬蜕從伯陽於閬風玄圃間必相與曰是可以參同契矣至大三年歲庚戌臘嗣天師張與材題朱文公謂參同契文章極好其用字皆根據古書又謂其做得極妙極精緻遂與蔡季通相訂正而爲之解註人見其解註之辭尚多闕疑而未詳遂謂文公且然寧復有詳於文公者殊不知仙家丹書皆内景法象隱語所謂口訣之祕則有師授斷非世儒訓詁之學所能意解夫文公之於是書豈文義有所未究蓋欠教外别傳一句耳今觀全陽子之發揮章剖句析發前人之所未發是得師授口訣而爲之說者也其語意直截大類蕭了眞議論衮衮且多引證學者試一覽之不惟得以通此一書又可以兼明悟眞翠虚諸書之旨當塗南谷子杜道堅見其發露天機略不吝惜深服其運心之普敬歎不自休遂爲之序又從而爲之歌曰至道不遠兮恒在目前竊天地之機兮修成胎僊妙莫妙兮凝吾之神安以待之兮若存而綿綿黄帝求玄珠兮象罔乃得此理可心會兮非言辭之可傳虚極靜篤兮恍惚變化絪緼蟠構兮如煙雲之廻旋龍吟虎嘯兮鉛汞交結依時採取兮進火烹煎劔挂南宫兮閉固神室鍊成五色石兮補自身之青天結胎片餉兮運火一年如靈雞之抱卵兮萬慮俱捐轉天根月窟之關鍵兮往來上下融融液液兮眞氣周帀乎三田勤而行之兮勿計得喪累土成層臺兮積涓流而成川機縁難偶兮時不待人下手速修兮母待雪霜之滿顚周易參同契登揮序神仙還丹之道至簡至易如此而已矣此者何易之太極是也太極動而生陽動極而靜靜而生陰靜極復動一動一靜互爲其根此乃造化之妙神之所爲道之自然者也易之爲書廣大悉備有天道焉有人道焉有地道焉仁者見之謂之仁知者見之謂之知千變萬化無往不可是故東漢魏伯陽假之以論作丹之意而號其書爲周易參同契也參也者參乎此也同也者同乎此也契也者契乎此也得師傳而與此參與此同與此契是爲正道反是則爲泛泛無稽之言臆度不根之學旁門小法而已非吾之所謂道也夫是書所述皆寓言也以天道言則曰日月曰寒暑以地道言則曰山澤曰鉛汞以人道言則曰夫婦曰男女豈眞有所謂日月寒暑山澤鉛汞夫婦男女哉無非譬喻也或言三五或言二八或言四象或言兩弦旁引曲喻名雖不同不過一陽一陰而已合陰陽而言之不過一太極而已散
