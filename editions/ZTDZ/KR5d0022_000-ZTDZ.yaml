body:
  text: 而成萬斂而成一渾兮闢兮其無窮兮與易之造化相通此其所以爲周易參同契也僕初讀是書莫省其說妄意揣度靡所不至或謂予曰子欲修丹須得神仙口訣研窮紙上語而求長生徒自勞耳而僕也篤信此書終不忍去手蓋魏公有千周萬遍神告心悟之說意者至人之言必不我欺於是憤悱研究矻矻者窮年忽一日果爾心靈自悟得其門而入自此遡流尋源則怡然理順若有神告之者然而未得師承猶弗敢遽執爲是冥搜暗索終夜忘寢信心愈篤遂感異人指示先天眞一之大要開說後天火候之細微决破重玄洞無疑惑歸而再取是書讀之則勢如剖竹迎刃而解又參以劉海蟾之還金張紫陽之悟眞薛紫賢之復命陳泥丸之翠虚但見觸處皆同而無有不契者矣僕不揣凡骨孜孜於神仙之學竊亦自笑其愚多幸夙有縁合得聞斯道之秘丹之眞運用蓋嘗試之丹之眞景象蓋嘗見之校之仙經若合符節因覩今之學仙而不得正傳者往往偏執膠固不務理之貫通小見自足不求道之大全黨甲以伐乙袒左以攻右牽合附會妄亂穿鑿以似是而飾眞非竟不究古仙本旨非惟自誤又以誤人僕用是不忍隱默敬爲是書添一註脚其間漏泄眞機並無靳恡凡論天地陰陽則參以先儒之語述藥火造化則證以諸仙之言反覆辯論務欲發明魏公本旨固不敢祕玄妙之機以絶人亦不敢雜謬悠之語以惑人後之來者與我同志試留心玩誦此書則斷斷有神告心悟之效無疑也雖然僕之言輶又何足取信於人明達之士但以魏公之言爲信而參其動靜之機同其陰陽之運契其畫前未畫之妙方表僕之所述果亦眞實不妄幸無以先入之說爲主而遽謂參同契爲紙上語云至元甲申四月十四日林屋山人全陽子俞琰玉吾自序
