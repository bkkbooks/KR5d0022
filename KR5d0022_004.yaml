front:
  text: 周易參同契發揮卷之四止四
  hash: sha256:f1f6a9f2c71c98c344815669d2d56df0c743903e28500e75c7320f63fdd7ee3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0022_HFL_004-001a, image: hfl/0625/0625-132.png}
body:
  text: 林屋山人全陽子俞琰述上篇第四若夫至聖不過伏羲始畫八卦效法天地文王帝之宗循而演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖伏義法天地而作易始畫八卦其先天一圖乾天在上坤地在下離日坎月則列於東西震雷巽風艮山兊澤則居於四隅是豈無所踵而然哉文王循卦體而演易乃作爻辭其後天一圖震巽二木生離火繼以坤土藏之兌乾二金生坎水繼以艮土止之又豈無所踵而然哉孔子踵羲文而讃易遂作十翼在當時雖無帝王之位而萬世爲帝王之師是乃庶聖之雄者也是三君子皆古之大聖人也伏羲生於邃古文王生於商末孔子生於晩周迭興御時步驟雖有優劣而以功德較之則前聖後聖其歸一揆蓋不相殊也且如八卦之畫爻辭之演十翼之作篇無閑言言無閑字推度重輕極爲詳審蓋其制作皆有所踵也今夫魏公作此參同契一書而必假易之卦象以發明其說可謂有所踵矣有形易忖量無兆難慮謀作事令可法爲世定此書素無前識資因師覺悟之皓若褰幃帳瞋目登高臺事之有形有兆者可以忖量可以慮謀金液大丹乃無形無兆之事不可忖量不可慮謀也苟不示之以言則後世何所取法此參同契所以作也然參同契之作也豈魏公自出己見哉不過因師授之說而爲之爾西升經云學不得明師安能解疑難蓋世間一法一術尚須磬折求師然後得其旨沉此金液大丹乃長生超脱之道學者得不低心參訪以期感遇哉葛稚川神仙傳云劉政求養生之術勤尋異聞不遠千里苟有勝己雖奴客必師事之今之人果能如劉君之不恥下間則自有眞仙踵門㸃破丹穴一旦得其口訣群疑盡釋皓若褰帷帳而撤其掩蔽豁如登高臺而眺平曠遠心目爲之開明豈不大快也歟火記六百篇所趣等不殊悟眞篇云契論經歌講至眞不將火候著於文要知口訣通玄處須共神仙仔細論後學不悟眞筌見有所謂火記六百篇之說則莫不惘然自失以爲火候如此其繁且難殊不知六百篇亦猶六十卦爾六十卦爲一月之候六百篇乃十箇月之候蓋一月六十卦卦卦一般十箇月六百篇篇篇相似故曰所趣等不殊也文字鄭重說世人不熟思尋度其源流幽明本共居竊爲賢者談曷敢輕爲書結舌欲不語絶道獲罪誅冩情著竹帛又恐泄天符猶豫增歎息俛仰輙思慮陶冶有法度未忍悉陳敷略述其綱紀枝條見扶踈古今丹書汗牛充棟千名萬字引喻無窮得不謂之鄭重乎然而尋度其源流則不過一陰一陽而已此兩者同出而異名古仙皆傾肝瀝膽以告世人而世人福縁淺薄自不暇熟思爾今夫魏公作此一書指陳鼎器之出處藥物之川原火候之法度與夫存亡有無主客先後之祕言言徹底字字著實蓋爲世之賢者設豈肯輕爲著述以釣人虚譽耶當知書爲曉者傳事爲識者貴農夫得彤弓以驅鳥南夷得衮衣以負薪金丹大道惟賢者而後樂此匪我知者可多談哉太上玄科曰遇人不傳失天道妄傳非人泄天寶傳得其人身有功妄傳七祖受冥考所以魏公將結舌而噤無一語則恐絶道脉而獲罪若冩情而著之竹帛則又恐泄天符而得譴於是猶豫增歎息俛仰輙思慮本欲明明直說以告學者實不敢輕泄眞機遂姑述藥物火候之大略以使後人因言而會意則庶乎此道不泯其所傳也旣不敢明於言又不忍祕於默故未免舉其宏綱撮其機要以陶冶法度散於三篇之中而有如枝條之扶踈也以金爲隄防水入乃優游金計有十五水數亦如之臨爐定銖兩五分水有餘二者以爲眞金重如本初其土遂不入二者與之俱三物相含受變化狀若神以金爲隄防水入乃優游者以上弦半斤金爲外爐東南半璧之隄防然後下弦半斤水自西而下入於北方内爐則其勢不迫而優游自如也金計有十五者自初一至十五也即上弦金半斤之謂也水數亦如之者自十六至三十也即下弦水半斤之謂也丹法先以文升後以武降不如是則不能深達於九泉之下故曰臨爐定銖兩五分水有餘也夫金水各半合成二八一斤之數一闔一闢往來不窮乃吾身之眞陰陽也然水要半斤有餘金又不可虧其半斤之重故曰二者以爲眞金重如本初也其土遂不入者周回鼎器間只有上弦半斤金下弦半斤水而土則無位也其所謂不入非不入也土無定位無所往而不入也且如天地二十四位其間即無戊己豈果無戊己哉蓋自壬子至於乾亥往來不定上下無常無非戊己所遊之地也二者與之俱者遍鼎器之間皆土而金水二者與之偕行也金水與土偕行則三物互相含受混而爲一矣混而爲一則縛住青山萬頃雲撈出碧潭一輪月而變化之狀如神矣至道篇云升降名爲金水運時巽曰眞風蓋升者金也降者水也而所以爲之升降者土也雖然金水土三物不過皆設象比喻爾究而言之大道從來絶名相眞仙本自無花草何金水之有哉何土之有哉下有太陽氣伏烝須臾間先液而後凝號曰黄轝焉玉芝書曰凡鍊丹隨子時陽氣而起火其火力方全餘外别時起火其火不然蓋子時太陽在北方而人身氣到尾閭關於此時而起火則内外相合乃可以盗天地之機而成丹其初太陽在下水火交媾二氣絪緼烝而爲液次則水中火發陽氣漸熾其液方凝於其中逼出金華是名眞鉛及其運用而上升則騰騰若車轝行於黄道之上故號之曰黄轝焉歲月將欲訖毁性傷壽年臘月三十日天運將周則日窮于次月窮于紀若以丹道言之則人身自有一周天與天地無以異也形體爲灰土狀若明䆫塵古歌云用鉛不用鉛須向鉛中作及至用鉛時用鉛還是錯又云鉛爲芽母芽爲鉛子旣得金華捨鉛不使其旨深矣人徒知子時腎氣生得火烹鍊凝而成液遂認爲眞鉛而欲取以㸃化離宫之眞汞殊不思旣成液矣則有形有質其體重濁安能逆流而升上神仙之作丹不過於此時發火於其下以感其氣爾火力旣盛其氣滃然上騰與山川之雲起相似迨夫升入泥丸然後化爲甘雨下入重樓蓋未嘗用其質也丹法所謂取清捨濁正謂此也清者浮而在上所謂狀若明䆫塵是也濁者沉而在下所謂形體爲灰土是也鍊外丹者取其飛結於鼎蓋之上者號曰明䆫塵魏公以此發明内丹欲學者觸類而長之也擣治并合之馳入赤色門擣治并合之者兩處擒來共一爐一泓神水結眞酥也馳入赤色門者奪得兔烏精與髓急須收入鼎中燒也金丹大藥産在坤種在乾乾居上爲鼎坤居下爲爐非猛烹極煆則不能出爐非倒行逆旋則不能升鼎悟眞篇云兩手捉來令死鬭化成一塊紫金霜又云河車不敢暫留停運入崐峯崘頂兹蓋後天下手功夫與先天産藥之時不同其中復有觀心吸神二用皆助火候之力者古仙往往祕而不言人誰知之或泥於下手之說從而按摩導引搬運轆轤徒爾勞神用力又安識運神火以觀眞心鼓巽風以吸眞神之妙用哉固塞其濟會務令致完堅金丹大成集云知時下手採將來固濟神廬勿輕泄又云搬歸頂上結三花牢閉玉關金鎖蓋金砂升鼎之時須是固濟謹密然後聖胎完堅也炎火張於下龍虎聲正勤指玄三十九章云只消閃入華池鼎眞火掀天煅一場漸悟集云因燒丹藥火炎下故使黄河水逆流此乃烹鍊之火不得不炎也悟眞篇云虎躍龍騰風浪麤中央正位産玄珠翠虚篇云龍吟虎嘯鉛汞交灼見黄芽并白雪蓋丹田之火熾盛則雲烝霧滃泥丸風生而宛有龍吟虎嘯聲也彭鶴林元樞歌云得訣歸來試鍊看龍爭虎鬭片時間九華天上人知得一夜風雷撼萬山歷試者當自知之始文使可修終竟武乃陳採藥之初凝神聚氣調匀鼻息呼吸應手迨夫神氣之入乎其根閉極則失於急縱放則失於蕩惟使其綿綿續續勿令間斷然後神久自凝息久自定少焉巽户轟雷龍騰虎躍則驅回尾穴連空焰趕入天衢直上奔也王保義云文火乃發生之火武火乃結實之火蓋始焉發生終焉結實始文終武不可以一途取也候視加謹愼審察調寒温候視加謹慎者塞兌垂簾含光默默候天地之氣將至然後定息以採之聚火以烹之須當視其老嫩不可輕易也悟眞篇云大都全藉修持力毫髮差殊不作丹豈可輕易哉審察調寒温者調停火力審察緊緩以漸而猛不可荒忙驟進也復命篇云火候直須牢穩審吹嘘全藉巽方風豈可驟進哉周旋十二節節盡更親觀十二節乃周天十二辰在吾身則火候方位是也夫十二節火候自子而升至午而降環鼎器之外如天有十二辰今焉十二節皆已行遍周天則天罡復指於子故曰周旋十二節節盡更親觀翠虚篇云震卦行歸西兌郷三陽姹女弄明璫巽風吹動珊瑚樹入艮歸坤又一陽與此同㫖氣索命將絶休死亡魄魂夫修鍊金丹將求長生今魏公乃謂氣索命將絶休死亡魄魂何也翠虚篇云促將百脉盡歸源脉住氣停丹始結蓋金液凝結之際璇璣玉衡一時停輪而日魂月魄皆沉淪於北方海底而索然滅藏故曰氣索命將絶休死亡魄魂所謂死者非死也此時歸根復命神凝精結八脉俱住呼吸俱無其氣索然如絶也絶後重甦則上清集所謂這回大死今方活是也嗚呼欲知大藥結成時六脉都停氣不馳此等景象苟不曾親歷烏能强言哉色轉更爲紫赫然成還丹翠虚篇云脱黄著紫因何事只爲河車數轉深蓋九轉火候數足則還丹赫然光明變化紫金之色也服之以一丸刀圭最爲神翠虚篇云採之鍊之未片餉一氣眇眇通三關三關來往氣無窮一道白脉朝泥丸泥丸之上紫金鼎鼎中一塊紫金團化爲玉漿流入口香甜清爽遍舌端吞之服之入五内臟腑暢甚身康安蓋還丹入口如蜜之甘香蔢𦽅之清凉所謂刀圭者刀頭圭角些子爾及其成功則千變萬化妙不可測非旁門小術可得而擬倫也稱之爲神宜哉推演五行數較約而不繁易曰天一地二天三地四天五地六天七地八天九地十乃五行生成數也子華子云天地之大數莫過乎五莫中乎五蓋五爲土數位居中央合北方水一則成六合南方火二則成七合東方木三則成八合西方金四則成九九者數之極也天下之數至九而止以九數言之五居一二三四六七八九之中實爲中數也數本無十所謂土之成數十者乃北方之一南方之二東方之三西方之四聚於中央輳而成十也故以中央之五散於四方而成六七八九則水火木金皆賴土而成若以四方之一二三四歸於中央而成十則水火木金皆返本還元而會於土中也吁玄哉悟眞篇云二物總因兒産母五行全要入中央混元寶章云四位分明顚倒用五行同起復同歸皆發明此義夫五行生成之數雖三尺童子亦能誦而知之求其義實則幾人能知其落處也旣不知其落處又安能得其實用於此見道要玄微天機深遠達者惟簡惟易而迷者愈繁愈難也舉水以激火奄然滅光明日月相薄蝕常在晦朔間水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然邵康節皇極經世書云日月之相食數之交也日望月則月食月掩日則日食猶水火之相尅也今夫舉水以激火則火爲水所尅而火光奄然而滅太陰掩太陽則陽爲陰所勝而陽光當晝而暗何者陰陽相交則必至相食此乃道之自然也魏公借日月交食之機以明丹道之妙而又舉水火相尅之說以並言之可謂詳矣雖然日月交食常在晦朔之問鍊金丹者盗天地奪造化得不求其所謂晦朔之間乎名者以定情字者縁性言金來歸性初乃得稱還丹復命篇云一物分爲二能知二者名二者即金木也金與木本無二體故以金爲名則以木爲字以木爲性則以金爲情其實即一物爾蓋金公本是東家子送在西鄰寄體生未可以稱還丹也惟以之傾入於東陽造化爐中歸家與青娥相見則産箇明珠似月圓乃得稱還丹也或曰寂然不動而情復乎性故稱還丹是則是矣然非魏公此章金情木性之本義也吾不敢虚說倣傚聖人文古記顯龍虎黄帝美金華淮南鍊秋石王陽嘉黄芽古記之龍虎黄帝之金華淮南之秋石王陽之黄芽無非託號以寓其微意而已今夫魏公之作是書豈肯鑿空駕虚以肆其臆說蓋亦倣傚古人之微意也朱子謂其用字皆根據古書誠非虚說賢者能持行不肖母與俱鬼谷子從子華子遊者十有二年業成而辭歸子華子戒之曰今汝之所治吾無間然矣然子之志則廣取而汎與也恐汝之後夫擇者也其將有剥汝之外乳而自築之宫庭者矣登汝之車而乘之以馳騁於四郊者矣取汝之所以爲璧者毁裂而五分之者矣夫道固惡於不傳也不傳則妨道又惡於不得其所傳也不得其所傳則病道今汝則徃矣而思所以愼厥與也則於吾無間然矣今魏公謂賢者能持行不肖母與俱其慮亦深矣蓋不肖則必佻薄佻薄則必無義其不關射羿之弓者鮮矣復命篇云此道至神至聖無令漏泄輕爲全憑德行兩相冝言語須防避忌當知金丹大道惟可傳與賢者苟非其人則不惟不可與語雖遠之可也嗚呼古今出世者傳載皆英傑控鶴御煙霞固非愚與拙彼不肖者何足以知之古今道由一對談吐所謀子得一萬事畢大哉一乎其千經萬論之原千變萬化之祖乎信矣哉天下無二道聖人無二心而萬卷仙經語總同金丹即此是根宗也學者加勉力留念深思惟至要言甚露昭昭不我欺魏公謂學者能反覆玩味此書一旦心領神會則知予至要之言果爲甚露而昭昭然無一毫之欺隱也噫魏公接引後學之心蓋切矣學者得不信受魏公此說誦持魏公此書而留念深思之哉周易參同契發揮卷之四
