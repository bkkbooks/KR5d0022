front:
  text: 周易參同契發揮卷之五止五
  hash: sha256:00bea8063831f9784e682cfd70dea8b73020f7327efe8034d9317d25265ff5ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0022_HFL_005-001a, image: hfl/0626/0626-004.png}
body:
  text: 林屋山人全陽子俞琰述中篇第一乾剛坤柔配合相包大哉人之有息也張橫渠正蒙云人之有息蓋剛柔相摩乾坤闔闢之象也何謂息一呼一吸是也夫人一呼脉再動氣行三寸一吸脉亦再動氣行三寸呼吸定息氣行六寸一晝夜百刻之中總一萬三千五百息氣行八百一十丈上下灌注如環之無端莫知其紀極也且人之未生也居母之腹隨母呼吸無視無聽惟有一息存焉及其生也剪去臍帶則一㸃真元之氣聚於臍下日復一日神出氣移遂不復再守胎中之一息今夫神仙修鍊之法使人回光內照呼吸太和蓋將返本還源而復歸於生身受氣之初也許旌陽醉思仙歌云內交真氣存呼吸自然造化返童顔靈源大道歌云千經萬論講玄微命蒂由來在真息外此皆邪說妄行非真要自然之道也今魏公謂乾剛坤柔配合相包言作丹之時以乾陽下交於坤陰使呼吸相含剛柔相當配為夫婦打成一片則神氣歸根性命合一而至藥孕於其中也或名之曰龍虎交媾又曰金木交併又曰龜蛇蟠虯又曰紅黑相投又曰天地交泰又曰玄黃相雜又曰金土混融又曰金汞同鼎又曰金火同爐又曰赤白相交又曰日月同宫又曰烏兔同穴又曰夫婦歡合又曰牛女相逢又曰牝牡相從又曰魂魄相沒又曰水土同鄉究而言之不過心息相依而陰陽內感神氣交結爾陽禀陰受雄雌相須陽禀陰受者瓊瑶花發露珠凝花漸開苞露漸深也雄雌相須者甲龍庚虎鎮相隨鉛汞同爐始可為也所謂禀受所謂相須即交媾之說也天地以陰陽交媾而生物丹法以陰陽交媾而生藥蓋未有不交媾而可以成造化者也玉芝書云玄黃若也無交媾爭得陽從坎下飛是乃作丹之大端修仙之第一義也元陽子大道歌云玄天汪汪配地黃兩情和合入洞房是此義也還金篇云先賢明露丹臺㫖幾度靈烏宿桂柯是此義也還元篇云西方金母最堅剛走入壬家水裏藏是此義也悟真篇云赤龍黑虎合西東四象交加戊己中是此義也王良器悟解篇云好將魂就魄陰盡變純陽是此義也復命篇云要知大道希夷理太陽移在月明中是此義也崇正篇云兩般靈物天然合些子神機這裏求是此義也上清集云别無他術只要神水入華池是此義也知此乃可以産藥乃可以結胎更得火候之訣鍊之則天鼓鼕鼕震地來玉塵糝糝散葭灰而升入泥丸矣若僅知有此而不得火候之訣則惟可暖其下元耳非還丹也古歌云從紅入黑是真修鍊黑入紅天仙已蓋丹法有先天後天無為有為之不同在先天則凝神入於坤臍而産藥至後天則移神入於乾頂而成丹先天則無為後天則有為不可以一律齊也偕以造化精氣乃舒翠虛篇云每常天地交合時奪取陰陽造化機是機即天地合發之機也夫人身中造化與天地造化相應今曰偕以造化者論其至妙全在天機與人機對舉人能虛心凝神與天地之機偕作則造化在吾掌握中矣天隱子云儻三百六十日內運自己之氣適合天地之真氣三兩次則自覺身體清和異於常時況久久習之積纍冥契則神仙之道不難至矣或曰要坐便坐何必辨川源識時日兹蓋不知有造化者耳未足與議也坎離冠首光耀垂敷坎離日月也丹法有內日月有外日月黃庭經云出日入月呼吸存此言內日月也又云三光焕照入子室此言外日月也二者蓋可相有而不可相無者也指玄三十九章云外若交時內亦交三關通透不須勞作丹之時內日月交精於其內外日月交光於其外內外攢簇久而不散則恍恍惚惚其中有物窈窈冥冥其中有精而滿空白雲亂參差也夫日月之照於天地間螺蚌吸之則生珠頑石蓄之則變玉何況人身自有日月豈不能回光自照結自己之真珠産自己之真玉哉上清集云乾坤運用大都不過坎和離石裏緣何懷玉因甚珠藏蚌腹借此顯天機可謂道在眼前矣道在眼前而學者猶或弗悟只緣天機太近故昧者往往當面蹉過而莫之能見也玄冥難測不可畫圖聖人揆度參序元基赤龍大丹訣云有物號玄冥金丹向此生是物也寂兮寥兮眇不可測豈可得而畫圖哉既不可得而畫圖則惟可心知意會而已然在己者固可心知意會而示人者得不假象託文而使之默會其機乎聖人於是探賾索隱以發明先天之極玄廣譬曲喻以參序金丹之元基此丹經子書所以傳行于世而參同契所以隼易而作也元基即根基也悟真篇云要得谷神長不死須憑玄牝立根基蓋伏鉛制汞全在玄牝所以玄牝為還丹之根基男子玄牝立則精氣固女子玄牝立則月事絶修鍊若不知此則藥材從何而生還丹從何而結火候從何而運用哉四者渾沌徑入虛無四者即乾坤坎離也合而為一故曰渾沌指玄篇云苗苗裔裔綿綿理南北東西自合來此乾坤坎離之所以合而為一也合而為一則神氣歸根徑入虛無窈窈冥冥莫知其所以然矣靈源大道歌云混合為一復忘一可與化功同出沒是也然而丹家所謂虛無非無心無念槁木死灰之謂也文子通玄真經云視於冥冥聽於無聲冥冥之中獨有曉焉寂寞之中獨有照焉此蓋不可言傳之妙也或者不悟乃認為禪家之寂滅則又謬矣若使金丹即禪學則徑自參禪可也何必從事乎乾坤坎離之多端而必須洞曉陰陽深達造化然後為得哉六十卦用張布為輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家丹法以乾坤為鼎器以坎離為藥物遂用其餘六十卦自屯蒙以至既濟未濟周回列於鼎外以為周天火候故曰六十卦用張布為輿此輿張布則六十卦皆為吾用而龍馬歸吾駕御矣上清玉真胎息訣云吾以神為車以氣為馬終日御之而不倦不倦即綿綿若存用之不勤也不勤云者亦非忘亦非守似有似無而不至于勤勞迫切也善乎廣成子之告黃帝曰我守其一以處其和故我修身千二百歲矣吾形未嘗衰夫身猶國也心猶君也心定則神凝氣和三宫自然升降百脉自然流通勤而行之無有不仙者谷神子了然論云治身之道以至神為本以至精為藥以沖和為用以無為為治無為則神凝神凝則和氣所鍾和氣所鍾則深根固柢深根固柢則長生久視之道成矣若不由此即非金液大還丹之法也大抵氣血之寓於人身貴乎不撓修鍊之功至簡至易不過抱元守一專氣致柔如嬰兒耳是故作丹之際亦無他術但虛心靜默凝神入於氣穴順其往來綿綿延延勿令間斷久之則神自凝息自定息定而氣聚氣聚而丹成更不用按摩導引吐納存想之勞也內指通玄祕訣云日往即往月來即來隨之出入不離丹臺自今觀之大丹之道唯一味元和之氣以成其變化餘無别徑也君子居其室出其言善則千里之外應之謂萬乘之主處九重之室發號施令順陰陽節人君居萬乘之尊處九重之邃出其言善則千里之外應之修鍊之士含光默默返照於內虛極靜篤則天地之氣自來歸之何者此有感則彼有應自然之理也發號施令順陰陽節者古之聖王孟春則命相布德和令孟秋則命將選士厲兵蓋亦依時應節而順夫天地之陰陽也治道如此丹道當何如哉藏器待時勿違卦日還金篇云莫教違漏刻長在一陽中蓋鍊丹之法先當知時尤當待時時苟未至則惟含光默默虛以待之而已不可為之先也許旌陽三藥歌云存心絶念候晶凝指玄三十九章云塞兌垂簾默默窺即藏器待時之謂也嗚呼時辰若至不勞心內自相交自結凝入室按時須等著一輪黃道自騰升豈可為之先也哉屯以子申蒙用寅戌六十卦用各自有日聊陳兩象未能究悉屯下震而上坎屯以子申者震之初九庚子爻坎之六四戊申爻也蒙下坎而上艮蒙用寅戌者坎之初六戊寅爻艮之六四丙戌爻也蓋子申寅戌即子午卯酉也即春夏秋冬也即金木水火也即龜蛇龍虎也皆寓言也今以六十卦觀之始於屯蒙終於既濟未濟其間陰爻陽爻互相交錯雖則各自不同而反體對體各自有合其實卦卦一般而魏公謂聊陳兩象未能究悉者欲使學者締觀屯蒙兩卦之象由此觸類而長之自可默會其餘諸卦之義也蓋卦有六爻兩卦計十二爻應一日十二時之數六十卦計三百六十爻應一月三百六十時之數魏公本意不過借此以論吾身火候之分至啓閉而已如移之需訟則曰需以子申訟用寅午移之師比則曰師以寅丑比用未申他卦皆倣此故曰聊陳兩象未能究悉也悟真篇云南北宗源翻卦象晨昏火候合天樞亦不過發明此義若使執文泥象而必欲推算卦體之策數求合卦畫之陰陽吾恐終身役役而不見其成功薾然疲役而不知其所歸可不哀耶在義設刑當仁施德西方為義東方為仁刑主殺伏德主生起今曰在義設刑者所以煆西方之鉛也當仁施德者所以鍊東方之汞也鉛屬金其性至剛藏於坎中非猛烹極煆則不能飛上故用武火逼之而不可施以文汞屬木其性至柔隱於離中一見真鉛則自然不動故用文火鍊之而不可施以武崇正篇云守城須假施文德野戰當先著武功作用兩般明辨取順宜得吉逆成凶此之謂也按歷法令至誠專密高鴻濛夢仙謡云採有時取有日採兮取兮須謹密故必按歷法令知下手之口訣至誠專密無纖毫之雜想然後神芝可録乃若一年處室自朝至暮內運靈旗亦當至誠專密用志不分然後丹可成身可仙若將大道為兒戲而輕易竊弄天機則朝行暮輟又非誠矣黃庭經云積功成鍊非自然是由精誠亦由專古今修丹之士固未有不誠而得之者亦未有不專心致志而可以成事者也昔者奕秋語二人奕一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣夫奕之為數小數也弗專心致志則弗得也況於道乎司馬子微坐忘論云無事安間方可修道蓋學道當得清靜無為不可以一毫外物纍其心若夫內接家事以自羈外綜王事以雜役此亦道之不專也張虛靜大道歌云神馭氣氣留形不須雜術自長生術則易知道難遇縱然遇了不專行所以千人萬人學畢竟終無一二成其說信矣今之學者不知仙道由積纍而成但欲以片餉功夫游戲而得之殊不思片餉乃結丹功夫而周年火候溫養則一日之內行坐寢食總如如惟恐火冷丹力遲奚可須臾間斷哉謹候日辰審察消息悟真篇云天地盈虛自有時審觀消息始知機又云月虧盈應精神之衰盛日出沒合榮衛之寒溫蓋一月有一月之盈虛消息一日有一日之盈虛消息晦朔弦望一月之盈虛消息也晝夜晨昏一日之盈虛消息也人身法天象地其氣血之盈虛消息悉與天地造化同途素問云平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉又云月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是故天地有晝夜晨昏人身亦有晝夜晨昏天地有晦朔弦望人身亦有晦朔弦望其間寒暑之推遷陰陽之代謝悉與天地胥似所以丹法以天為鼎以地為爐以月為藥之用而採取必按月之盈虧以日為火之候而動靜必視日之出沒自始至末無一不與天地合有如皇極經世書以寅為開物猶歲之驚蟄數自此而始戌為閉物猶歲之立冬數至此而止非丹法運火之候乎亥子丑三時則日入于地而不見有數而不行其間一陽初動處萬物未生時是聖人所以見天地之心又以範圍天地曲成萬物造化在我者也非丹法採藥之時乎凡而抽添運用沐浴交結一一取法天地造化而為之是以謂之至道若不依天地造化而别求他法則是旁門小術區區臆度之說非至道也淮南子云蛤蟹龜珠與月盛衰又云月虛而魚腦減月死而螺蛖膲夫以至微之物尚或與天地造化相應而況於人乎於此見修丹於月望則氣血滿而藥力全望後則氣血減而藥力少所以翠虛篇謂月夜望中能採取天魂地魄結靈丹而又謂交加二八為丹母望遠徒勞覓虎龍也又如悟真篇云八月十五望蟾輝正是金精壯盛時若到一陽才起復便堪進火莫廷遲崇正篇云兌金萬寶正西成桂魄中秋倍樣明便好鍊頭施採取用功擬待一陽生金丹大成集云恰恰相當妙絶奇中秋天上月圓時陽生急採無令緩進火功夫要慮危即非以八月十五金精壯盛取譬亦非曰一年止有八月十五可以採取乃若白紫清廖蟾輝皆謂八月十五夜子時入室蓋以八月晝夜均陰陽分此時秋高氣清金精正旺不寒不暖最冝修鍊古仙於此時結胎所以盜天地之金精感天地之清氣也或者不得其傳弗知其的惟於八月十五夜吸採月光是乃懸網以捕風握繩以繫影者也奚足語至道哉抑又有說焉朝文元公隨因紀述云唐中嶽隱士栖真子施肩吾述靈響詞其序中云偶覽三靜經云夫修鍊之士當須入三靜關陶鍊神氣補續年命大靜三百日中靜二百日小靜一百日遂發至懇且試小靜即以開成三年戊午歲起自正月一日庚申閉户不交人事尅期百日方出靜室未踰月而神光照目百靈集耳精爽不昧此三者皆應則知仙經祕典不虛設也今夫修鍊大丹亦當如此蓋靜久則神清氣和鼎器內完方可以修鍊如終日汩沒於塵緣勞其筋骨役其心志而遽欲於八月十五一舉成功亦戛戛乎難矣纖芥不正悔吝為賊二至改度乖錯委曲隆冬大暑盛夏霰雪二分縱橫不應漏刻風雨不節水旱相伐蝗蟲湧沸山崩地裂天見其怪群異旁出悟真篇云縱識朱砂及黑鉛不知火候也如間大都全藉修持力毫髮差殊不作丹所謂火者非存心想腎之火乃身中天然之真火也所謂候者非輪刻掐時之候乃身中天然之氣候也火之為性遇風則熾遇土則藏用之不可太過亦不可不及全在調其文武審其寒溫微以巽風吹之熾以坤土藏之使之得中而無太過不及之患則大小無傷兩國全而片餉之間見丹頭矣調停運用正謂此也儻毫髮差殊則二至改度於南北二分縱橫於東西隆冬變為大暑盛夏翻作霰雪而鉛汞飛走群異旁出矣孝子用心感動皇極近出己口遠流殊域復命篇云一夫一婦資天地三女三男合始終蓋乾生三男坤生三女總曰六子今乾父坤母位乎上下而六子運用於其間往來上下一惟父母是從故名之曰孝子皇極者中央正位也周回八方會歸之所也孝子能用心而感動之則虎嘯一聲龍出窟鸞飛鳳舞入金城矣如其舉動悖亂不協于極則玄珠迸散靈汞逃亡六子非孝子乃丹道之逆賊焉爾或以招禍或以致福或興太平或造兵革四者之來由乎胸臆悟真篇云火生於木本藏鋒不會鑽研莫强攻禍發總因斯害己要能制伏覓金公蓋有藥而行火候則金被火逼奔騰至於離宫化而為水反以尅火故火無炎上之患若無藥而行火候則虛陽上攻適所以自焚其軀此招禍致福之所由分也又云日月三旬一遇逢以時易日法神功守城野戰知凶吉增得靈砂滿鼎紅蓋真鉛生於坎宫濁而不起欲其擒制離宫之真汞當用武火猛烹極煆然後飛騰而上及其至於離宫與真汞交結之後則冝守城沐浴更不可加以火此太平兵革之迥不同也或以招禍或以致福或興太平或造兵革其所以然者豈由他哉反求諸心而已矣動靜有常奉其繩墨寂然不動反本復靜坤之時也吾則靜以待之靜極而動陽氣潛萌於黃鍾之宫復之時也吾則動以應之故曰動靜有常奉其繩墨當動而或雜之以靜當靜而或間之以動或助長於其先或忘失於其後則非奉其繩墨焉夫古之至人其動也天行其靜也淵默當動則動當靜則靜自有常法今之學者不知丹法之動靜有常或專主乎動或專主乎靜其所謂動者乃行氣之動其所謂靜者乃禪定之靜二者胥失之矣指玄三十九章不云乎人人氣血本通流榮衛陰陽百刻周豈在閉門學行氣正如頭上又安頭曷嘗以行氣為動哉翠虛篇不云乎惟此乾坤真運用不必兀兀徒無言無心無念神已昏安得凝聚為胎仙又豈以禪定為靜哉金丹大成集云陽主動陰主靜翠虛曰動中求靜靜中有為動靜有作口口傳之學者殆未可以管見輕議也四時順冝與氣相得四時者身中之春夏秋冬也下功之時善調停而順其宜然後溫凉寒暑各得其所吕純陽詩云水火均平方是藥陰陽差互不成丹其功皆在乎調停也剛柔斷矣不相涉入剛陽剛也柔陰柔也剛柔斷矣不相涉入者陽剛用事則一意在下不可涉於上也陰柔用事則一意在上不可涉於下也張紫陽石橋歌云水生火火生水水火須分前後隊此之謂也五行守界不妄盈縮王良器天童經頌云金木中央并水火五般守定一丹田孰謂不守而可得哉蓋此五者散則周身為氣聚則丹田成寶今以之凝然端守於丹田而不妄盈縮則相與混融化為一氣而凝成金液矣盈者太過之謂也縮者不及之謂也翠虛篇云靈汞通真變化多只冝存守不冝過蓋太過則傷物不及則又不能生物惟當綿綿若存以意守之而已守之之久則時至氣化罐滿必溢神明當自來也易行周流詘信反覆易日月也日月行於黃道晝夜往來周流不息上半月陽伸陰屈魂長魄消下半月陰伸陽屈魂消魄長循環反覆無有窮已人身首乾而腹坤儼如天地其二氣上升下降亦如天地內指通玄祕訣云日月常行黃赤道衆真學此作還丹其法即與天地無異然其所以效日月之運用與天地以同功其要在乎任督二脉蓋任督二脉為一身陰陽之海五氣真元此為機會任脉者起於中極之下以上毛際循腹裏上關元至咽喉屬陰脉之海督脉者起於下極之腧並於脊裏上至風府入腦上巔循額至鼻柱屬陽脉之海所以謂之任脉者女子得之以妊養也謂之督脉者以其督領經脉之海也鹿壽長生五百歲為白鹿千歲為青鹿蓋能通其督脉者也如龜鶴蟾蜍皆壽千歲蓋能通其任脉者也南華真經云緣督以為經可以保身可以全生人能通此二脉則百脉皆通自然周身流轉無有停壅之患而長生久視之道斷在此矣內指通玄祕訣云法水能朝有祕關逍遙日夜遣輪環於中壅滯生諸病才决通流便駐顔其是之謂乎又如朗然子詩云泝流直上至泥丸關節才通便駐顔又云常使氣衝關節透自然精滿谷神存豈皆虛言哉陳希夷以為改换腥肥氣脉行韓逍遙以為轉輪才一月便𢍆玄中玄若有作用實無作用似乎靜定即非靜定蓋自高上元君密傳以來遞相付囑迄至于今除此道外更無别道有言環中者有言周天者兹蓋周身上下陰陽升降之正路也道德經云谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤陰符經云三反晝夜用師萬倍黃庭經云皆在心內運天經晝夜存之自長生度人經云旋斗歷箕回度五常天童經云三宫升降上下往來無窮無已上清玉真胎息訣云上至泥丸下至命門二景相隨可救殘老劉虛谷易傳云栖神上玄總氣下牝反覆運轉升降無窮白紫清東樓法語云上自天谷下及陰端二景相逢打成一塊崔公入藥鏡云歸根竅復命關貫尾閭通泥丸許旌陽三藥歌云三田內轉長流布青目烏髭髮黑時吳宗玄學仙歌云坎離反覆顛倒顛天地日月俱回旋指玄篇云一馬自隨天變化六龍長駕日循環吕純陽詩云時人若要學長生先是樞機晝夜行靜中吟云馳駕登天軸晝夜如車輪還金篇云默運乾坤一合泰從他日月兩邊流玉芝書云東轉西流人莫測地騰天降鬼難知靈源大道歌云元和內運即成真呼吸外施終未了張鴻濛還元篇云十二時中子作頭般添運用勿停休悟真篇云五行妙用法乾坤乾坤運兮五行分復命篇云巡行十二位赤腳猛將軍劉高尚法語云神存生氣氣非口鼻陰降陽升同流天地劉虛谷還丹篇云下降上升循轂軸左旋右覆合樞機崇正篇云般運有功連晝夜斡旋至妙體璣璇混元寶章云自强不息同乾運六尺身中抱九天翠虛篇云晝運靈旗夜火芝抽添運用切防危還源篇云誰能知運用大意要黃婆上清集云晝夜河車不暫停默契大造同運行全真集云氣血轉流渾不漏漸悟集云斡運日月輪水雲集云常耕清靜田三假定守無為舍一間劉長生仙藥集云住行坐臥運坎迎離鳴道集云安間自得長生道晝夜無聲轉法輪王玉陽雲光集云斡運內丹憑火候載搬烏兔走瓊輪太古集云周天度數還知道關節熏蒸處處通不過皆是此道也或謂之翻筋斗或謂之轉心輪一曰法天之樞仙壽萬億一曰元和內運可保長生千經萬論無往不同引古證今若合符節即非行氣即非存想亦非肘後飛金精亦非運心思脊骨兹蓋呼吸太和保守自然真要之道也奈何世之學者每每恱難而不恱易求遠而不求近雖有道者欲與開發孰為之信內指通玄祕訣云世人不樂正法論東却樂說西苟非洞曉陰陽造化見得透徹莫之信也晦朔之間合符行中晦朔之間乃三十日半夜以前是也丹法以時易日則每日亥子之交即晦朔之間也天地開闢於此時日月合璧於此時草木孳萌於此時人身之陰陽交會於此時神仙於此時而作丹則內真外應若合符節不先不後正當其中在乾四德為真元之間在十二卦為坤之末復之初乃天地人之至妙至妙者也渾沌鴻濛牝牡相從渾沌鴻濛者一氣未分之時也牝牡相從者陰陽混於其中而未相離也當其未相離也神凝氣聚混融為一內不覺其一身外不知其宇宙與道冥一萬慮俱遺溟溟涬涬不可得而名强名之曰太一含真氣或名之曰先天一氣翠虛篇云大藥須憑神氣精採來一處結交成丹頭只是先天氣鍊作黃芽發玉英蓋神仙之修鍊别無他術只是採取先天一氣以為金丹之母勤而行之指日可與鍾吕並駕復命篇云採二儀未判之氣奪龍虎始媾之精閃入黃房煆成至寶又云採取須教密誠心辨醜妍至難尋意脉容易失寒泉特恐學者執於有為而不明大道之先天泥於採取而不能尋其意脉爾崇正篇云寒淵萬丈睡驪龍頷下藏珠炯炯紅謹密不驚方採得更依時日法神功蓋採者以不採而採之取者以不取而取之在於靜定中有非動作可為也昔黃帝遺其玄珠使知索使離朱索使喫詬索索之皆不得乃使象罔象罔得之象罔者忘形之謂也必忘形罔象然後先天一氣可得擊壤集先天吟云一片先天號太虛當其無事見真腴又云若問先天一字無後天方要著功夫其說是已蓋太極未判陰陽未分此天地之先天也以丹法言之則寂然不動反本復靜之時是也混元寶章云寂然不動感而通窺見陰陽造化功信乎寂然不動則心與天通而造化可奪也翠虛篇云莫向腎中求造化却須心裏覓先天可謂深切著明矣擊壤集思慮吟云思慮未起鬼神莫知還金篇云鬼神不見處龍虎定相尋先天大道須是致虛極守靜篤不可以一毫思慮加乎其間當其寂然不動萬慮俱泯之時河海靜默山嶽藏煙日月停景璇璣不行八脉歸源呼吸俱無既深入於窈冥之中竟不知天之為蓋地之為輿亦不知世之有人己之有軀少焉三宫氣滿機動籟鳴則一劍鑿開渾沌兩手擘裂鴻濛是謂無中生有寧玄子詩云不在塵勞不在山直須求到窈冥端豈不信然哉今人不知大道之祖或指真鉛為先天或指天一生水為先天或指兩腎中間一㸃明為先天或指臍間為先天或指鼻祖為先天或指目光為先天或指運氣為先天此皆尋枝摘葉之偏見非大道之先天也易曰先天而天弗違後天而奉天時夫先天而天弗違者純乎天理之自然雖天亦不能違也後天而奉天時者天時之至吾當奉承之也非天下之至通其孰能與於此哉滋液潤澤施化流通還丹篇云萬里陰沉春氣合九霄清徹露華凝妙矣哉其陰陽交感之真景象歟斯時也精神四達並流無所不極上際於天下蟠於地冥冥兮如煙嵐之罩山濛濛兮如霧氣之籠水霏霏兮如冬雪之漸凝漸聚沉沉兮如漿水之漸矴漸清此乃身中之天地絪緼身中之男女構精也逮夫時至氣化感而遂通則倏爾火輪煎地脉愕然神瀵湧山椒天地之間被潤澤而大豐美矣擊壤集恍惚吟云恍惚陰陽初變化絪緼天地乍回旋中間些子好光景安得功夫入語言苟非親造實詣又豈信有如此之真景象哉天地神靈不可度量陰陽相交而神煞藏沒此天地神靈之時也龍虎相交而鬼神不知此吾身神靈之時也以吾身之神靈合天地之神靈則內真外應巽門於定中豁開而兩畔同升合為一矣還元篇云只於罔象無形處有箇長生不死根信乎惟忘形罔象然後可得見也若使可以存想存思計較度量而得之則不謂之神靈矣利用安身隱形而藏晦朔之間日月合璧於北方光耀隱而不見丹法以時易日於半夜坤復之交疊足端坐如山石之不動口緘舌氣如冬蛇之蟄伏此即利用安身隱形而藏也其時含光默默返照於其內一呼一吸悠悠綿綿迤邐歸於命蒂久之但覺窈窈冥冥如臨萬丈不測之淵潭此乃神氣歸根身心復命金液凝結之時也翠虛篇云氣入丹田養白鴉斯時方曰結黃芽如其心猿不定意馬四馳則神氣散亂於外欲望結成還丹其可得乎始於東北箕斗之鄉旋而右轉嘔輪吐萌潛潭見象發散精光昴畢之上震出為徵陽氣造端初九潛龍陽以三立陰以八通故三日震動八日兌行九二見龍和平有明三五德就乾體乃成九三夕惕虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主進止不得踰時二十三日典守弦期九五飛龍天位喜六五坤承結括終始韞養衆子世為類母上九亢龍戰德于野始於東北箕斗之鄉東北火候造端之地也昴畢之上震出為徵震亦火候造端之卦也翠虛篇云有一子母分胎路妙在尾箕牛斗女蓋謂此也此章引用先天六卦及乾六爻以象月體之盈虧又雜以二十八宿月所臨之位無非譬喻也學者未得其訣而冒然讀之其不心目俱眩者鮮矣夫修丹火候與月之消長無異月三日哉生明蓋始於東北箕斗之鄉旋而右轉至晚嘔輪吐萌於西南昴畢之上其象如震以乾卦言則應乾之初九此喻吾身陽火起緒之初也月初八上弦其光半明其象如兌以乾卦言則應乾之九二此喻吾身陽火用功之半也月三五十五與日相望魂盛光盈其象如乾以乾卦言則應乾之九三此喻吾身陽火圓滿之時也月十六望罷載生魄其象如巽以乾卦言則應乾之九四此喻吾身陰符繼統之始也月二十三下弦其光半虧其象如艮以乾卦言則應乾之九五此喻吾身陰符用功之半也月六五三十光盡泯其象如坤以乾卦言則應乾之上九此喻吾身陰符結括之時也魏公以六卦喻火候而又配以乾之六爻何也蓋丹乃純陽之寶乾乃純陽之卦也於六卦之中乾稱九三夕惕虧折神符坤稱上九亢龍戰德于野又何也蓋守城於乾而用文野戰於坤而用武皆當防危慮險也用九翩翩為道規矩陽數已訖訖則復起推情合性轉而相與循據璇璣升降上下周流六爻難以察覩故無常位為易宗祖九陽數也易曰參天兩地而倚數蓋取五行之生數天一天三天五參天相倚而成九地二地四兩地相倚而成六此坤之所以用六而乾之所以用九也丹法之所謂用九乃刻中火候之九轉蓋法乾也用九翩翩為道規矩陽數已訖訖則復起者一爻才過一爻又來而不敢毫髮差殊也復命篇云數中無走失火候莫教遲蓋謂此也情金情也性木性也一物分二間隔東西若得斗柄之機斡運則木性愛金金情戀木不間隔矣故曰推情合性轉而相與循據璇璣升降上下也周流六爻難以察覩故無常位為易宗祖者周流一身潛天而天潛地而地如六爻之變動也六爻謂前乾卦之六爻也引而伸之觸類而長之為六卦為六十卦其義一也還金篇云九轉極玄機開爐逆火飛蓋謂九轉功夫自寅而起至戌而止乃刻中火候之祕訣其間有抽添進退之妙沐浴交結之奧是故謂之極玄修鍊若不知此則雖得真藥安能成丹此魏公所以不敢輕泄而姑借乾元用九之說以露其機也自今觀之神仙之還丹乃身中之易也火候之九轉乃身中之乾也身中之乾無爻畫之可觀無象數之可求迎之不見其首隨之不見其後又安有方體而得以察覩也哉周易參同契發揮卷之五
