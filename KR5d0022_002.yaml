front:
  text: 周易參同契發揮卷之二止二
  hash: sha256:916b447e01a00f233a962e7f80a641beb882b94b16162d3c916b1232ee4c7832
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0022_HFL_002-001a, image: hfl/0625/0625-046.png}
body:
  text: 林屋山人全陽子俞琰述上篇第二於是仲尼讚鴻濛乾坤德洞虚稽古當元皇關雎建始初冠婚氣相紐元年乃芽滋嘗觀易首乾坤書稱稽古詩以關雎爲先禮以冠婚爲重春秋以元年爲第一義是知聖人之作經皆有所託始也鍊丹而不究其始又安能洞曉陰陽深達造化哉聖人不虚生上觀顯天符天符有進退詘信以應時符者合也月行於天一月一度與日交合故謂之天符天符有進退屈信以應時者月自初一以後光漸進魂長魄消陽伸陰屈象一日之子至巳十六以後光漸退魄長魂消陰伸陽屈象一日之午至亥也古之至人觀天之道執天之行遂借天符之進退陰陽之屈伸設爲火候法象以示人蓋天地儼如一鼎器日月乃藥物也日月行乎天地間往來出没即火候也人能即此反求諸身自可默會火候進退之妙矣故易統天心復卦建始初易者一陰一陽之謂也天心北方子之中也復十一月之卦也復之爲卦正當北方子位之中氣應冬至邵康節擊壤集冬至吟云冬至子之半天心無改移是也朱晦庵以爲康節此詩最好蓋立冬是十月初小雪是十月中大雪是十一月初冬至是十一月中小寒是十二月初大寒是十二月中冬至子之半即十一月之半也人言夜半子時爲冬至蓋夜半以前一半屬子時今推五行者多不知之然數每從這處起略不差移此所以爲天心今魏公謂易統天心復卦建始初者陽氣潛萌於孟冬純陰之月而始於坤卦之下積成一畫之陽然後變爲復卦也人固知十月爲坤至十一月則五陰之下變一陽畫而爲復殊不知十一月冬至無縁平白便生一畫之陽遽變爲復蓋十月小雪坤下爻已有陽生其中但一日之内一月之間方長得三十分之一必積之一月至十一月冬至始滿一畫爲復然此亦譬喻也年以冬至爲復月以朔旦爲復日以子時爲復無非借以發眀身中造化殆不必泥於年月日時也翠虚篇云一月三旬一日同修丹法象奪天功蓋年與月同月與日同日與時同於是蹙年成月蹙月成日蹙日成時一時之中自有一陽來復之機是機也不在冬至不在朔旦亦不在子時非深達天地陰陽莫知玄機如是其祕也長子繼父體因母立兆基乾父下交於坤母之初爻而成震震爲長男故曰長子繼父體震自坤體而生猶嬰兒生於母腹中故曰因母立兆基悟眞篇云金公本是東家子送與西鄰寄體生與此同㫖知此則知鍊丹不用尋冬至身中自有一陽生而不泥乎年月日時之說矣消息應鍾律升降據斗樞自子至巳爲息自午至亥爲消消息應鍾律者鍾律於一歲十二月之内每月换一管一歲换盡十二律吾身火候之消息亦猶是也自下而上爲升自上而下爲降升降據斗樞者斗樞於一日十二時之内每時移一位一日移遍十二辰吾身火候之升降亦猶是也指玄篇云寥寥九地移鐘管黯黯長天運斗魁蓋不過取象比喻而已即非用律管之短長天罡之所指而爲期度也三日出爲爽震受庚西方月三日哉生明昏在西方庚位其象如震應震卦之納庚若以吾身之火候言之則所謂河車不敢暫留停之時是也八日兊受丁上弦平如繩月至八日爲上弦昏在南方丁位其象如兊應兊卦之納丁以喻吾身陽火上升之半也十五乾體就盛滿甲東方月至十五與日相望昏在東方甲位其象如乾應乾卦之納甲以喻吾身陽火盛滿之候也蟾蜍與兔魄日月無雙明蟾蜍者月之精兔魄者日之光日月無雙明者日以昱乎晝月以昱乎夜日出則月没月出則日没晝夜遞炤而出入更卷舒也人之呼吸何異於是哉豈不見黄庭經云出日入月呼吸存蓋呼吸即日月也蟾蜍視卦節兔者吐生光丹法以上半月爲陽屬震兌乾下半月爲陰屬巽艮坤故曰蟾蜍視卦節月爲太陰日爲太陽陽主吐陰主納月本無光受日之光而白故曰兔者吐生光七八道已訖屈折低下降七八即十五也陽火自震而升至于十五純乾則已滿上半月之候其勢極矣其道危矣蓋不容不屈曲折旋而低降也陳朝元玉芝書云九重城裏龍車發十二樓前虎駕回即此義也十六轉受綂巽辛見平明月至十六日旣生魄晨在西方辛位明乍虧其象如巽應巽卦之納辛以吾身火候言之則陰受陽禪峰回路轉之時也艮直於丙南下弦二十三月至二十三日爲下弦晨在南方丙位明半虧其象如艮應艮卦之納丙以喻吾身陰符下降之半也坤乙三十日東方喪其明月至三十日爲晦晨在東方乙位明盡喪其象如坤應坤卦之納乙以喻吾身陰符窮盡之候也節盡相禪與繼體復生龍魏公以一月三十日分爲六節自朔旦至五日爲第一節屬震六日至十日爲第二節屬兌十一日至十五日爲第三節屬乾十六日至二十日爲第四節屬巽二十一日至二十五日爲第五節屬艮二十六日至三十日爲第六節屬坤六節旣盡則日月合朔之後陽又受陰之禪復變爲震震爲龍一陽動於二陰之下震也重淵之下有動物豈非龍乎壬癸配甲乙乾坤括始終乾納甲壬坤納乙癸故曰壬癸配甲乙十榦始於甲乙終於壬癸故曰乾坤括始終蓋納甲者火候之取象也火候之抽添與月之盈虧無異今以六卦布於一月則震象三日月出於庚兊象上弦月見於丁乾象望日月滿於甲巽象十六日月虧於辛艮象下弦月消於丙坤象晦日月没於乙不過借此以論身中六卦火候之進退非眞以爲一月三十日也何以明之蓋參以歷法則晝夜有短長若晝短日没於申則月合於申望於寅晝長日没於戌則月合於戌望於辰十二月間三日之月未必盡見庚十五日之月未必盡見甲合朔有先後則上下弦未必盡在八日二十三日望晦未必盡在十五日三十日今魏公謂三日出爲爽震受庚西方十六轉受綂巽辛見平明蓋指二八月晝夜均平之時姑以取象而已非眞以月出庚之時進火月虧辛之時退符也學者但觀月體之盈虧反而求之吾身則身中一陽生即三日月生之震象也二陽長即八日月弦之兌象也三陽滿即十五日月圓之乾象也一陰生即十六日月虧之巽象也二陰長即二十三日月弦之艮象也三陰足即三十日月没之坤象也豈可拘以月出没之方位而律以卦體爻畫之數與夫歷家盈縮短長之法哉納甲圖七八數十五九六亦相當四者合三十易象索滅藏七火數也八木數也合之得十五九金數也六水數也合之亦得十五四者合之共得三十應一月三十日之數三十數終則日月合璧易象索然而滅藏也復命篇云一月一還爲一轉一年九轉九還同唯憑二卦推刑德五六回歸戊巳中五六即三十也四象圖象彼仲冬節草木皆摧傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩廣太玄無形容虚寂不可覩匡郭以消亡謬誤失事緒言還自敗傷丹法所謂冬至所謂晦朔之間皆比喻陰極陽生之時也以一月言之則如月晦之夜月光索然而滅藏以一年言之則如仲冬之節草木索然而摧盡其義一也易曰雷在地中復先王以至日閉關商旅不行后不省方蓋安靜以養其動而仰順乎天道也然而天道甚浩廣眞機在於頃刻之間太玄無形容妙處在於窈冥之内故當日中冬至之時必先閉塞其兌澄心守默使金汞同歸於爐中如日月合璧之時隱藏其匡郭沉淪於洞虚則神凝氣聚金液乃結儻或忘其緘默任重樓浩浩而出則是自取其傷敗也别序斯四象以曉後生盲四象即七八九六也即上文所謂七八數十五九六亦相當是也以七八九六合之則爲三十應一月三十日之數皆設象比喻也魏公恐學者不得其說以盲引盲妄認三十日之盈虚消息爲一月火候故又别序此七八九六之四象以曉其未曉者庶有以顯夫一月三十日之數皆譬喻而非眞以月之三日進火月之十六日退符也有如子午卯酉子申寅戌春夏秋冬分至啓閉晝夜晨昏還返歸居皆此義也學者若知七八九六即一月三十日之數則其餘泛引曲喻皆可默而識之矣何必執文泥象哉八卦布列曜運移不失中中者黄道也八方布以八卦周回列以二十八宿乃日月往來之行路也悟眞篇云旣驅二物歸黄道爭得靈丹不解生作丹之時但恐心猿奔逸於外爾苟能收視返聽凝神片時使二物歸於黄道而不失其中則氤氲交媾結成一滴露珠而飛落丹田中矣元精眇難覩推度效符徵元精生於窈冥眇不可覩道德經云窈兮冥兮其中有精其精甚眞其中有信蓋大丹之道與造化相符天信至則瓊鐘一扣玉洞雙開此其徵也古歌云始青之下月與日兩畔同升合爲一非洞曉天地之陰陽深達吾身之造化豈可俄而度也居則觀其象準擬其形容作丹之時當外立表漏以測天運之晷刻内修眞一以驗本身之刻漏庶不失天地之機然神定氣和則内外符合神昏氣躁則時刻差互不可不定也立表以爲範占候定吉凶大丹火候不用時辰何必立表占候哉所以立表占候者恐失天人合發之機也若不會玄機而自朝至暮從事於土圭刻漏以爲火候則又謬之甚矣發號順節令勿失爻動時地雷震動巽門開龍向東潭踴躍來此身中一陽爻動之時也此時暖氣沖融心覺恍惚便堪進火勿可緩也珠玉集還源篇云萬籟風初起千山月乍圓急須行政令便可運周天此之謂也指玄篇云䃱磹光中扶赤子鼓鼙聲裏用將軍亦此之謂也上察河圖文下序地形流中稽於人心參合考三才施栖眞三住銘序云與日月而周回同天河而輪轉輪轉無窮壽命無極謂大丹之道與天道相參合也施栖眞靜中吟云妙用如江河周流無窮已長養玄谷芝灌漑瑶池水謂大丹之道與地道相參合也夫大丹之道所以與天地相參合者何哉皆在乎此心默爲之運用也古之修丹者仰以觀於天文俯以察於地理中以稽於人心於是虚吾心運吾神回天關轉地軸上應河漢之昭回下應海潮之升降天地雖大造化雖妙而其日月星辰之著明五行八卦之環列皆爲吾掇入於一身之中或爲吾之鼎爐或爲吾之藥物或爲吾之火侯反身而觀三才皆備於我蓋未嘗外吾身而求之他也擊壤集觀易吟云一物其來有一身一身還有一乾坤能知萬物備於我肯把三才别立根天向一中分造化人於心上起經綸天人安有兩般義道不虚行只在人淵乎其有㫖哉動則依卦變靜則循彖辭道德經云致虚極守靜篤萬物並作吾以觀其復夫物芸芸各復歸其根歸根曰靜靜曰復命至矣哉此萬物之所以復命也吾身之金丹大藥其胚胎於至靜之中而産於陰極之時乎易曰至哉坤元萬物資生乃順承天坤厚載物德合無疆蓋坤爲地純陰之卦也地能翕受天氣故百昌皆産於土丹法含光返照之時潛神于内與純陰之月閑塞成冬略無少異復命篇云受得眞仙訣陰中鍊至陽蓋謂此也然靜極必有動以繼之頃之一陽動於六陰之下一變而爲復再變爲臨三變爲泰四變爲大壯五變爲夬至六變爲純乾則陽氣周遍於六虚而現出深潭日一輪矣乾坤用施行天地然後治乾坤之用坎離是也天地得坎離運用於其間所以陰陽交泰而和氣致祥天地一日而非坎離則造化或幾乎熄矣大丹妙用法乾坤安有異於乾坤者哉可不愼乎御政之首一陽纔動作丹時猶人君御政之首也發號施令可不愼乎管括微密闓舒布寶管括微密者眼含其光耳凝其韻鼻調其息舌緘其氣疊足端坐潛神内守不可一毫外用其心也蓋眼旣不視魂自歸肝耳旣不聽精自歸腎舌旣不聲神自歸心鼻旣不香魄自歸肺四肢旣不動意自歸脾然後魂在肝而不從眼漏魄在肺而不從鼻漏神在心而不從口漏精在腎而不從耳漏意在脾而不從四肢孔竅漏五者皆無漏矣則精神魂魄意相與混融化爲一氣而聚於丹田也迨夫一息换鼻吾心恍然則龍虎衝關大路開而一渠流轉八瓊槳矣要道魁杓綂化綱紐丹道之要全在乎斗斗者所以斡運一身之陰陽統攝一身之萬化猶網之有綱衣之有紐也蓋人身三田分於三處若得斗柄之機斡運則眞氣上下循環如天河之流轉此之謂要道也若夫復命篇云驅回北斗轉天罡手握南辰入洞房是又要之又要者也爻象内動吉凶外起悟眞篇云受氣之初容易得抽添運用切防危蓋一陽生于身内是謂受氣之初得之固易然於此時下手則吉凶悔吝生乎動不可毫髮差殊也五緯錯順應時感動四七乖戾誃離仰俯五行要攅簇金火要同爐亦在人一念間返本還源爾否則鼎中列宿皆差違而天地懸隔矣文昌綂録詰責台輔百官有司各典所部史記天官書云斗魁戴匡六星曰文昌宫今曰文昌綂録者絳宫天子綂乾坤也人身之中安有所謂文昌者哉無非譬喻也天有三台四輔丹有三龍四虎詰責台輔者甲乙無令失庚辛莫要差也天有衆星分野丹有衆卦火符百官有司各典所部者按一年二十四氣列周天二十八宿而鼎爐火候密推排也由是言之則天之萬象森羅皆在吾一身中矣日含五行精月受六律紀五六三十度度竟復更始日有十榦五榦剛而五榦柔月有十二管六管陰而六管陽以丹道言之日即火也日含五行精者一物含五彩也月即藥也月受六律紀者白金烹六卦也五六三十度度竟復更始者太陽一日行一度行至三十度則又與太陰交合周而復始未嘗暫停也原始要終存亡之緒始月朔也終月晦也存亡之緒者晦朔之間陰將盡而猶未盡陽將生而猶生也然所謂晦朔乃譬喻爾非眞所謂三十日之終初一日之始也或君驕溢亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法剌譏詰過貽主君乃神也臣乃氣也作丹之時鉛汞歸土釜身心寂不動蓋身動則氣散心動則神散須是凝神聚氣心息相依然後靈胎可結不然則身中之弦望有盈縮而乖變凶咎矣推求其故蓋由心君放肆而違道於是氣亦邪佞而行而順軌故曰執法剌譏詰過貽主辰極處正優游任下復命篇云北斗南辰下眉毛眼睫邊灰心行水火定息採眞鉛又云精氣元爲本神靈共一家但能擒五賊自可結三花當其含光默默之時要在綿綿若存任其自然不可勞其神也明堂布政國無害道史記天官書云東宫蒼龍房心心爲明堂在人身則洞房紫極靈門户是也黄庭經云明堂金匱紫房間上清眞人當吾前黄裳子丹氣頻煩借問何在兩眉端於此垂光下照則猶人君坐眀堂而布政而通道於九夷八蠻也復命篇云洞門常寂照蓬島鎮長春與此同旨内以養已安靜虚無王重陽全眞集云玄關妙用不難窮只在無言靜默中蓋心安而虚道自來居虚極靜篤則元陽眞氣自復也原本隱明内照形軀全眞集云如通須是搜元有要見還應向内觀蓋返本還源回光内照乃修鍊之大端先儒謂道家養生之法收視返聽如金水潛光於内誠哉是言也閉塞其兌築固靈株兌口也靈株坎宫也閉塞其兌則上不泄築固靈株則下不漏揚子太玄經云藏心于淵美厥靈根蓋神不外馳則和氣𠑽周美在其中也三光陸沉温養子珠三光洞房之靈象也人能撮聚三光返照於其内則中央正位産玄珠矣黄庭經云洞房靈象斗日月三光焕照入子室明眼之士請試思之視之不見近而易求金丹大藥只在目前豈不近耶奈何視之不見摶之不得雖近猶遠也若得法度求之則不過片餉功夫便有滿目黄華顯露夫何遠之有悟眞篇云功夫容易藥非遥說破人須失笑笑也者笑其近而易求而人自索之於高遠也復命篇云分明只在眼睛前自是時人不見天惟其不見也於是舍内務外或採日精月華或鍊金石草木或行房中之術正所謂道在邇而求諸遠事在易而求諸難悲夫黄中漸通理潤澤達肌膚丹田有物而一氣流通則和順積中而英華外發也初正則終修榦立末可持表端則影直源深則流長得其一則萬事畢矣一者以掩蔽世人莫知之大道之祖不出一氣而成變化析而爲黑白分而爲青黄喻之曰日月名之曰龍虎有如許之紛紛是皆陰陽二字也其實即一物也又如神水華池之名鉛爐土釜之號皆一處也或曰冬至子時或曰晦朔之間人不知以爲一陽來復必在冬至子時日月合𨐬必在晦朔之間於是檢尋曆日輪刻掐時謬之甚矣抑孰知攅年蹙月攅月蹙日攅日蹙時而一時之中自有一年一月之造化哉然一時即一處也一處即一物也故凡冬夏二至春秋兩分卯酉甲庚晦朔弦望子午巳亥子申寅戌二十四氣七十二候一年交合一月周回離坎之時兔雞之月巽乾之穴二八之門朝屯暮蒙晝姤夜復盡在此一中岀翠虚篇云後來依舊去參人勘破多少野狐精箇箇不知眞一處總是旁門不是眞世之知此一者能有幾人哉周易參同契發揮卷之二
