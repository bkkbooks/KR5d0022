body:
  text: 林屋山人全陽子俞琰述下篇第一惟昔聖賢懷玄抱真無視無聽抱神以靜廣成子之懷玄抱真也專氣致柔能如嬰兒老子之懷玄抱真也乃若女媧氏鍊五色石以補天冉相氏得其環中以隨成此又列禦寇漆園吏之丹法也學者勿謂夙有仙骨方可希求要之但辦肯心無不可者聖賢何人哉豫何人哉有為者亦若是志道之士誠能發勇猛心辦精進力勤而行之夙夜不休則時至而氣自化水到而渠自成又何患乎煮頑石之不爛磨鐵杵之不為針也哉但恐學而不遇遇而不得雖得真訣復不能守朝為而夕欲其成坐修而立望其效升勺之利未堅而鐘石之費相尋根荄之據未極而氷霜之毒交攻如是則雖有廣成老子為之師列子莊子為之友亦末如之何也已矣馬丹陽金玉集云鍊氣作生涯怡神為日用常教龍虎調不使馬猿弄又云觀天行大道默然得交泰本師傳口訣無為功最大蓋古之修丹者一念不生萬法俱忘澄澄湛湛惟道是從於靜定之中抱沖和之氣出息微微入息綿綿上至泥丸下至命門周流不已神氣無一刻之不相聚及其內丹將成則元氣兀然自住於丹田中與天地分一氣而治昔者黃帝間居大庭之館三月內視蓋用此道也此道至簡至易於一日十二時中但使心長馭氣氣與神合形乃長存與日月而周回同天河而輪轉輪轉無窮壽命無極指玄篇云但能息息皆相顧换盡形骸玉液流其説是已至若呼而不得神宰則一息不全吸而不得神宰亦一息不全要在心與息常相依神與氣常相守念念相續打成一片然後形神俱妙與道合真靈源大道歌云神是性兮氣是命神不外馳氣自定仙藥集云氣神相見性住命定蓋不可斯須少離也常人則不然氣雖呼吸於內神常縈役於外自幼而趨壯自壯而趨老未嘗有一息駐於形中遂使神與氣各行而不相守卒之宅舍空虛墻壁頽毁而主人不能以自存此豈天地殺之鬼神害之哉失道而自逝也施栖真鍾吕傳道集云所呼者自己之元氣從中而出所吸者天地之正氣自外而入若其根源牢固元氣不損則呼吸之間尚可奪天地之正氣苟或根源不固精竭氣弱上則元氣已泄下則本宫無補所吸天地之正氣隨呼而出身中之元氣不為己之所有而反為天地之所奪是故仙人多云採鍊貴及時鼎器一敗則不可救藥蘇子由晚年問養生之説於鄭仙姑仙姑曰君器敗矣難以成道蓋藥材貴乎早年修鍊若至晚年行持則老來精虧氣耗鉛枯汞少縱能用力惟可住世安樂爾翠虛篇云分明只在片言間老少殊途有易難蓋謂此也或曰吕純陽五十歲而始聞道馬自然劉朗然皆得道於六十四歲之後何也曰屋破修容易藥枯生不難但知歸復法金寶積如山顧吾平日所養何如爾服鍊九鼎化迹隱淪九鼎火候之九轉也九轉火候數足則變化蹤迹憑虛御空而逍遙乎天地之間也吕純陽窑頭坯歌云九年火候都經過忽爾天門頂中破真人出現大神通從此天仙來相賀此之謂也含精養神通德三元三元上中下之三田也含養之久力到功深則精神內藏和氣充周於一身而百骸萬竅無不貫通自然如天河之流轉混元寶章云歲久不勞施運用火輪水軸自回環是也夫所謂含精養神者外不役其形骸內不勞其心志也蓋神太用則歇精太用則竭日復一日斫喪殆盡而與草木俱腐豈不大可哀乎是故修丹者虛其心忘其形守其一抱其靈故能固其精保其氣全其神三田精滿五臟氣盈然後謂之丹成談景升化書云悲則雨淚辛則雨涕憤則結癭怒則結疽心之所欲氣之所屬無所不育邪苟為此正必為彼是以大人節悲辛戒憤怒得灝氣之門所以收其根知元神之囊所以韜其光若蚌內守若石內藏所以為珠玉之房誠至論也精溢腠理筋骨緻堅腠理皮膚之間也修鍊至於精溢腠理則血皆化為膏矣翠虛篇云如今通身是白血已覺四季無寒熱蓋修鍊之功莫大乎填腦腦者髓之海腦髓滿則純陽流溢諸髓皆滿然後骨實筋堅永無寒暑之憂也衆邪辟除正氣常存人之所以能修鍊而長生者由其能盜天地之正氣也人之所以能盜天地之正氣者由其有呼吸也呼至於根吸至於蒂是以能盜天地之正氣歸之於丹田也人之呼吸猶天地之呼吸也皇極經世書云冬至之後為呼夏至之後為吸此天地一歲之呼吸也張觀物注云冬至之後陽長陰消舒萬物以出故為呼夏至之後陰長陽消斂萬物以入故為吸若自日言則子以後為呼午以後為吸天之一年一日僅如人之一息是以一元之數十二萬九千六百年在大化中為一年而已今以丹道言之一日有一萬三千五百呼一萬三千五百吸一呼一吸為一息則一息之間潛奪天運一萬三千五百年之數一年三百六十日四百八十六萬息潛奪天運四百八十六萬年之數於是换盡穢濁之軀變成純陽之體始而易氣次而易血次而易脈次而易肉次而易髓次而易筋次而易骨次而易髮次而易形積九年而閲九變然後陰盡陽純而與天地齊年兹其為長生超脫之道也今魏公謂衆邪辟除正氣常存者晝夜運火鍊盡陰氣變為純陽而正氣常存乃能長生也翠虛篇云透體金光骨髓香金筋玉骨盡純陽鍊教赤血流為白陰氣銷磨身自康蓋純陽者為仙純陰者為鬼陰陽相半者為人人能鍊陽以銷陰乃可以為純陽之仙若有纖毫陰氣煆鍊未盡則不得謂之純陽也纍積長久化形而仙大矣哉丹道之法天也難矣哉丹功之不息也何以言之陰符經云觀天之道執天之行盡矣夫天之所以長且久者以其晝夜之運也人能觀天之道反而求之吾身亦如天道晝夜之運則長生久視之道實在於此捨此更無他道也蓋晝夜之運即天之道也人以藐然六尺之軀乃能法天之道而與天道同其運則其為道也豈不大矣哉易曰天行健君子以自強不息夫子作象之意欲使知道君子象天行之健也天之所以常行而不已者以其健爾健則能行之無已君子欲其行之不息當法乾健以自強其志斯可矣蓋不息者人之所難也天道之運晝夜而不息人而象天道晝夜之運而不息豈不難矣哉然而天下之大事必作於其細天下之難事必作於其易合抱之木生於毫末九層之臺起於纍土千里之行始於足下是故聖人圖難於其易為大於其細亦在夫積久之功耳黃庭經云仙人道士非有神積精纍氣乃成真故自片餉結胎之後百日而功靈十月而胎圓一年而小成三年而大成以至九年功滿人事皆盡然後可以遺世獨立羽化而登仙蓋未有不自積纍長久而得之者若曰不必積久功夫而可以平地登仙則猶一鍬而欲掘九仞之井一步而欲登億丈之城豈有是理哉通玄真經云寸步不休跛鱉千里纍土不止丘山從成臨河欲魚不如歸而織網故夫人之學道不患不成惟患不勤不患不勤惟患無久遠之心蓋久遠之心最為難也吳宗玄玄綱論云知道者千而志道者一志道者千而專精者一專精者千而勤久者一是以學者衆而成者寡也若知者能立志立志者能絶俗絶俗者能專精專精者能勤久未有學而不得者也世降俗末去聖逾遠學者每以躁競之心涉希靜之塗意速而事遲望近而應遠皆莫能相終夫既立志不堅信道不篤朝為而夕改始勤而中輟恱於須臾厭於持久乃欲與天地齊年不亦愚乎內觀經云知道易信道難信道易行道難行道易得道難得道易守道難若使不難則滿市皆神仙矣安足為異耶吕純陽詩云三畝丹田無種種種時須假赤龍耕曾將此種教人種不解營治道不生兹豈道之遠人哉人自遠道爾人徒見悟真篇云赫赤金丹一日成古仙實語信堪聽若言九載三年者盡是推延欵日程遂執此以訕笑纍積長久之説殊不究紫陽此詩蓋引用韓逍遙之語以曉夫世之不知有一日見效之妙而徒事三年九載之勤者爾非曰一日便可登仙更不用纍積長久之功也嘗試論之上清集云教我行持片餉間骨毛寒心花結成一粒紅蕖言即此是金丹又云開禧元年中秋夜焚香跪地口相傳朅爾行持三兩日天地日月軟如綿又云縱使功夫汞見鉛不知火候也徒然大都全藉周天火十月聖胎方始圓雖結丹頭終耗失要知火候始凝堅如此則金丹之小效固可以片餉見之而金丹之大功蓋不止於一日矣抑嘗以古人之説考之如王易玄云九轉一年功壽可同天地又云火運經千日爐開見八瓊又如韓逍遙云十月滿足麗乎二儀又云三年法天行道永世無為金質王韓二公皆唐之得道真仙也肯妄言哉又如吕純陽云千日功夫不暫間河車般載上崑山又云才得天符下玉都三千日裏積功夫又如劉海蟾云爐閉八關終九五藥通七返是三年又云九轉功成千日候已知名姓列仙都夫洞賓之與海蟾乃列仙中之錚錚者肯妄言哉不特此也又如陳朝元云含養胞胎須十月焚燒丹藥在三年又云九年還返無差錯鍊取純陽作至真又如王良器云大將天法烹千日恁時除假只留真又云靈芝種滿三丹田千日功夫延萬年又如薛紫賢云四象包含歸戊己精勤十月産嬰孩又云升騰須假至三年携養殷勤愛戀又如劉虛谷云顔容可定因三住胎息成功合一周又云大力欲就三千日妙用無虧十二時又如陳默默云氣候簇成須百日功夫鍊就是三年又如李長源云勿謂丹成消一日到頭須下數年功又如陳翠虛云片餉功夫修便現老成須是過三年又云千朝火候知時節必定芽成汞自乾諸公之説豈皆謬為此論以誑惑後人者丘長春磻溪集云假使福輕魔障重挨排功到必周全吾黨其勉諸憂憫後生好道之倫隨傍風采指畫古文著為圖藉開示後昆露見枝條隱藏本根託號諸石覆謬衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不仕農夫失耘商人棄貨志士家貧吾甚傷之定録此文字約易思事省不繁披列其條核實可觀分兩有數因而相循故為亂辭孔竅其門智者審思以意參焉指玄三十九章云求仙不識真鉛汞間讀丹書千萬篇蓋丹書所謂鉛汞皆比喻也在學者觸類而長之爾殆不可執文泥象舍吾身而求之外也載惟古之聖賢憂憫後世有好道之士不得其説遂為之隨傍風采指畫古文著為圖籍以開示之實欲使學者有可以為遡流尋源之地也然其著書立言往往隱藏本根不肯明言其事惟託五金八石為號以露見枝條而已後之得其書者不究其旨徒爾韞櫝終身以至子子孫孫世世迷惑燒竭朱汞竟無所得遂使在官者棄官服田者廢田商人失其本業志士無以聊生甚可傷也魏公傷其如是遂乃定録此參同契一書傳行於世其間分兩有數不妄發一句因而相循不間著一字枝條一披核實隨見可謂字約而易思事省而不繁矣或者見其三篇之多疑其太贅殊不知三篇即一篇也一篇即一句也以一句口訣散布於三篇之內所以錯亂其辭孔竅其門者不敢成片漏泄也智者誠能審而思之以意參之必當自悟焉法象莫大乎天地兮玄溝數萬里道之大無可得而形容若必欲形容此道則惟有天地而已矣天地者法象之至大者也有玄溝焉自尾箕之間至柳星之分界斷天盤不知其幾萬里也修丹者誠能法天象地反而求之吾身則身中自有一壼天方知魏公之所謂玄溝吾身亦自有之蓋不用求之於天也何謂玄溝天河是也河鼓臨星紀兮人民皆驚駭河鼓天河邊之星也其位在斗牛之間星紀天盤之丑位也河鼓臨星紀則驅回尾穴連空焰趕入天衢直上奔正當其斬關出路之時一身之人民豈不竦然驚駭翠虛篇云曲江之上金烏飛姮娥已與斗牛歡即河鼓臨星紀之謂也又云山河大地發猛火於中萬象生風雷即人民皆驚駭之謂也晷景妄前却兮九年被凶咎晷景即火候也前却即進退也九年即九轉也以九年蹙而小之則一月一還為一轉翠虛篇謂九轉功夫月用九是也更蹙而小之則一刻之中自有小九轉金丹大成集謂九轉功夫在片時是也晷景妄前却兮九年被凶咎者火候之進退不可毫髮差殊然後九轉之間穩乘黃牝馬而可保無咎反是則九轉之間翻却紫河車而凶咎隨至矣悟真篇云大都全藉修持力毫髮差殊不作丹信不可不愼也皇上覽視之兮王者退自後太上素靈經云人身有三一上一為身之天帝中一為絳宫之丹皇下一為黃庭之元王夫上一天帝即泥丸太一君也中一丹皇即絳宫天子也下一元王即丹田元陽君也今魏公謂皇上覽視之者運神火照入坎中以驅逐坎中之真陽也王者退自後者真陽因火逼而出位於坎也於此駕動河車則真陽飛騰而起以點化離宫之真陰矣關楗有低昂兮周天遂奔走天形如彈丸晝夜運轉周匝無休其南北兩端一高一下乃關楗也人身亦然天關在上地軸在下若能回天關轉地軸上下相應則一息一周天也江河無枯竭兮水流注於海海乃百川所歸之地江河之水所以注於海而無枯竭者名山大川孔竅相通而往來要循環也人身亦然一氣流通則八路之水皆逆流奔注於元海中也天地之雌雄兮徘徊子與午午者天之中也子者地之中也子午為陰陽相交水火相會之地日月至此勢必徘徊今人以太陽當天謂之停午即徘徊之義也以丹道言之上升下降一起一伏亦徘徊於子午蓋與天地同途初無異也寅申陰陽祖兮出入終復始斗指寅而天下春陽氣自此而發生暢萬物以出斗指申而天下秋陰氣自此而肅殺斂萬物以入則知寅申者陰陽之祖萬物出入之門也以丹道言之自寅而出自申而入周而復始與天地豈有異哉循斗而招搖兮執衡定元紀史記天宫書云北斗七星杓携龍角𢖍殷南斗魁枕參首用昏建者杓夜半建者衡平旦建者魁又云斗為帝車運于中央臨制四鄉分陰陽建四時均五行移節度定諸紀皆繫乎斗索隱曰春秋運斗極云斗第一天樞第二璇第三璣第四權第五𢖍第六闓陽第七瑶光一至四為魁五至七為杓今魏公謂循斗而招搖兮執𢖍定元紀者吾身之天罡所指起於子而周歷十二辰也夫斗居天之中猶心居人身之中是故天以斗為機人以心為機丹法以心運火候猶天以斗運十二辰也翠虛篇云奪取天機妙夜半看辰杓一些珠露阿誰運到稻花頭蓋謂此也升熬於甑山兮炎火張於下白虎唱導前兮蒼龍和於後甑山即昆崘山也藥升之時金爐火熾玉鼎湯煎虎先嘯龍後吟猶夫倡而婦隨也金丹大成集云夜深龍吟虎嘯時急駕河車無暫歇須臾般入泥丸頂進火玉爐烹似雪蓋發明此義也朱雀翺翔戲兮飛揚色五彩遭遇羅網施兮壓止不得舉嗷嗷聲甚悲兮嬰兒之慕母顚倒就湯鑊兮摧折傷毛羽朱雀火也顛倒運於鼎中驅趂五行因成五彩翺翔于上為羅網所罩則風雲滿鼎鳴作嬰兒之聲也既被網羅壓止而不得飛舉遂斂身東羽伏於鼎中也赤龍大丹訣云朱鳥愛高飛蟾蜍捉住伊號雖稱姹女啼不過嬰兒赫赫威從盛冥冥力漸衰即此説也元陽子大道歌云青龍逐虎虎隨龍赤禽交會聲嗈嗈調氣運火逐離宫丹砂入腹身自沖亦此義也刻漏未過半兮龍鱗甲𩯓起五色象炫耀兮變化無常主潏潏鼎沸馳兮暴湧不休止接連重疊纍兮犬牙相錯拒形如仲冬冰兮闌干吐鍾乳崔嵬以雜厠兮交積相支拄刻漏未過半兮龍鱗甲𩯓起者採之鍊之未片餉一氣眇眇通三關而黃雲成陳白羊成隊金錢金花金鱗紛紛而來也五色象炫耀兮變化無常主者風搖寶樹光盈目雨打瓊花雪滿衣而彤霞紫霧變現不一也潏潏鼎沸馳兮暴湧不休止者丹田火熾泥丸風生而三宫氣滿有如飯甑蒸透之時熱湯沸湧於釜中也接連重疊纍兮犬牙相錯拒形如仲冬氷兮闌干吐鍾乳崔嵬以雜厠兮交積相支拄者一抽一添漸凝漸聚澆灌黃芽出土而自然結蘂復生英也翠虛篇云辛苦都來只十月漸漸採取漸凝結學者誠能潛心內鍊晝夜無倦則丹體逐時時不定火功一夜夜無差如上景象當一一自見之也陰陽得其配兮淡泊自相守悟真篇云陰陽同類歸交感二八相當自合親蓋真息綿綿勿令間斷則陰陽自得其配虛心凝神純一不雜則陰陽自然相守也青龍處房六兮春華震東卯白虎在昂七兮秋芒兌西酉朱雀在張二兮正陽離南午三者俱來朝兮家屬為親侣本之但二物兮末乃為三五三五并危一兮都集歸一所治如上科兮日數亦取甫周天二十八宿東方七宿謂之蒼龍西方七宿謂之白虎周天十二次東方三次中間一次曰大火西方三次中間一次曰大梁大火居東方三次之中在辰屬卯在卦屬震在四時屬春在五行屬木而房五度又居大火之中故曰青龍處房六兮春華震東卯也大梁居西方三次之中在辰屬酉在卦屬兌在四時屬秋在五行屬金而昴七度又居大梁之中故曰白虎在昴七兮秋芒兌西酉也朱雀在張二兮正陽離南午者張乃南方之宿其象為朱雀也然張有十八度而特言其二者蓋以周天三百六十五度自北方虛危之間平分天盤為兩假而危初度正與南方張二度相對也三者俱來朝兮家屬為親侣者青龍白虎朱雀三方之正氣皆歸於玄武之位而房六昴七應水火之成數張二危一又應水火之生數猶家屬之相親也本之但二物兮末乃為三五三五并危一兮都集歸一所者推原其本即是水火二物而已二物運於鼎中遂列為三五三五即房六昴七張二也三家相見并而歸於危一則結成嬰兒也治之如上科兮日數亦取甫者修鍊大丹當依上法度而行迎一陽之候以進火而妙用始於虛危也周易參同契發揮卷之八
