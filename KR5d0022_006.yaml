body:
  text: 林屋山人全陽子俞琰述中篇第二朔旦爲復陽氣始通出入無疾立表微剛黄鍾建子兆乃滋彰播施柔暖黎烝得常復一陽之卦也律應黄鍾以一日言之爲夜半子以一月言之爲初一至初三半以一歲言之則斗杓建子之月是也此時陽氣始通喻身中陽火發動之初火氣至微要在不縱不拘不疾不緩使温温柔暖播施於鼎器間也崇正篇云黄鍾爲子一陽興受氣之初數未增用火温温無煆制毎愁龍弱虎威凌蓋初爻之運一陽始通止可輕輕地默默舉未堪用力故曰出入無疾然又不可太柔要當撥動頂門關捩微微挈之故曰立表微剛須臾火力熾盛逼出眞鉛至于箕斗之郷則河車不敢暫留停運入崐崘峯頂也金丹大成集云復卦起潛龍戊己微調未可攻九二見龍臨卦主神通從此爐中次第紅泰卦恰相逢猛火燒乾藉巽風鍊就黄芽并白雪奇功還返歸坤道始窮火候之口訣盡於此矣臨爐施條開路生光光耀漸進日以益長丑之大吕結正低昂臨二陽之卦也律應大吕以一日言之爲雞鳴丑以一月言之爲初三半至初五以一歲言之則斗杓建丑之月是也此時陽氣漸進喻身中陽火漸漸條暢而黄道漸漸開明故言光耀漸進日以益長也仰以成泰剛柔並隆陰陽交接小往大來輻輳於寅運而趨時泰三陽之卦也律應太簇以一日言之爲平旦寅以一月言之爲初六至初八半以一歲言之則斗杓建寅之月是也此時陽氣出地喻身中三陽上升漸漸起漸漸仰當急駕河車搬歸鼎内故言運而趨時也運而趨時者火候之運至此不可留停也然有一日之寅有一刻之寅朗然子詩云勤吞津液過千口長記存神聽五更此言一日之寅也金丹大成集云交得三陽逢泰卦便堪進火法神功此言一刻之寅也一日之寅固依天上之日辰以爲期度世固有知之者矣若夫一刻之寅乃身中火候之祕古今丹書皆不敢明言眞所謂千人萬人中一人兩人知者也玄哉玄哉漸歷大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分大壯四陽之卦也律應夾鍾以一日言之爲日出卯以一月言之爲初八半至初十以一歲言之則斗杓建卯之月是也此時陰佐陽氣聚物而出喻身中陽火方半氣候停匀故言刑德相負晝夜始分然萬物莫不當春而發生而榆莢至是墮落何也蓋陽中有陰也夬陰以退陽升而前洗濯羽翮振索宿塵夬五陽之卦也律應姑洗以一日言之爲食時辰以一月言之爲十一至十三半以一歲言之則斗杓建辰之月是也此時陽氣旣盛逼近天際喻身中陽火升上故言陽升而前而又言洗濯羽翮振索宿塵者蓋大鵬將徙天池則水擊而上其勢當奮發也乾徤盛明廣被四鄰陽終於已中而相干乾六陽之卦也律應中吕以一日言之爲禺中已以一月言之爲十三半至十五以一歲言之則斗杓建巳之月是也此時陽氣盛極周遍宇内喻身中陽火圓滿而丹光發現山頭神瀵分爲四埒注於山下經營一國無不周徧故言廣被四鄰而又言陽終於已中而相干者陽火數終則陰符用事也姤始紀緒履霜最先井底寒泉午爲蕤賔賔服於陰陰爲主人姤一陰之卦也律應蕤賓以一日言之爲日中午以一月言之爲十六至十八半以一歲言之則斗杓建午之月是也此時陰氣方生喻身中陰符起緒之地靈丹旣入口中回來却入寒泉當馴致其道送歸丹田不可荒忙急速故言履霜最先井底寒泉而又言賓服於陰陰爲主人者蓋一陰用事則衆陽爲賓也賔者敬也防危慮險之謂也遯世去位收斂其精懷德俟時栖遲昧冥遯二陰之卦也律應林鍾以一日言之爲日昳未以一月言之爲十八半至二十以一歲言之則斗杓建未之月是也此時陰氣漸長喻身中陰符離去午位收斂而降下如賢者退隱僻處巖谷故言懷德俟時栖遲昩冥也否塞不通萌者不生陰信陽詘毁傷姓名否三陰之卦也律應夷則以一日言之爲晡時申以一月言之爲二十一至二十三半以一歲言之則斗杓建申之月是也此時陽氣漸衰喻身中陰符愈降愈下猶三陰肅殺之時草本黄落故言陰伸陽屈毁傷姓名也觀其權量察仲秋情任蓄微稚老枯復榮薺麥芽糵因冒以生觀四陰之卦也律應南吕以一日言之爲日入酉以一月言之爲二十三半至二十五以一歲言之則斗杓建酉之月是也此時陰佐陽功物皆縮小而成喻身中陰符過半降而入於丹田如木之斂花就實故言任蓄微稚然萬物莫不逢秋而枯老而薺麥至此芽糵者何也蓋陰中有陽也剥爛肢體消滅其形化氣旣竭亡失至神剥五陰之卦也律應亡射以一日言之爲黄昏戌以一月言之爲二十六至二十八半以一歲言之則斗杓建戌之月是也此時陽氣衰滅枝頭之果皆潰爛而墜於地喻身中陰符將盡而神功無所施故言化氣旣竭亡失至神也夫火生於寅旺於午墓於戌戌者閉物之時也一刻之火候至此而畢事復命篇謂東西動靜合朝昏是也一日之火候亦至此而休功吕純陽詩云日日隨他出又沉是也區區旁門小術但知其一不知其二又安能究竟於此道窮則反歸乎坤元恒順地理承天布宣玄幽遠眇隔閡相連應度育種陰陽之原寥廓恍惚莫知其端先迷失軌後爲主君坤六陰之卦也律應應鍾以一日言之爲人定亥以一月言之爲二十八半至三十以一歲言之則斗杓建亥之月是也此時純陰用事萬物至此皆歸根而復命喻身中陰符窮極則寂然不動反本復靜故言道窮則反歸乎坤元也恒順地理承天布宣與上篇金本從日生朔旦受日符義同蓋天地日月一也月受日光而日不爲之虧然月之光乃日之光也天氣降而至於地地中生物者皆天氣也人身法天象地其間陰陽感合與天地無以異也還元篇云以神歸氣内丹道自然成人能返觀内照凝神入於氣穴則神存生氣凝成液迨夫天機一動則紅蓮含蘂露珠凝碧飛落華池滴滴而丹田結聚作丹樞也玄幽遠眇隔閡相連謂亥子之間乃陰陽交界之時當其六陰窮極一陽未生寂兮寥兮猶如天地未判之初神仙作丹於此時塞兌垂簾以神光下照於坎宫始者幽幽冥冥儼如寒潭之浸月次則神與氣合隔閡潛通猶如磁石之吸鐵也應度育種陰陽之原謂作丹之際正如亥月純坤用事之時其時萬物歸根閉塞成冬冬雖主藏然一歲發育之功實胚胎於此特閉藏無迹人不得而見爾而古人以此純陰之月名爲陽月者蓋小雪之日陽氣已生於六陰之下積而至於冬至遂滿一畫之陽變爲復卦也丹道亦然當夜氣之未央但凝神聚氣端坐片時少焉神氣歸根自然無中生有漸凝漸聚積成一㸃金精翠虚篇云金精即是坤宫藥坤在西南爲川源蟾光終日照西川即此便是藥之根蓋一陽不生於復而生於坤坤雖至陰然陰裏生陽實爲産藥之川源也寥廓恍惚莫知其端者身心復命之時神入寥廓與太虚一體靜定之久候至心花發現則三宫氣滿但覺恍恍惚惚莫知其所以然也蓋恍恍惚惚其中有物窈窈冥冥其中有精乃修鍊之要樞也玉芝書云此四句古今口誦者億兆明義理者能有幾人蓋非親造實詣無由知也是故狀其窈冥則如臨深俯幽論其恍惚則如晝夢初覺此乃眞景象非譬喻也學者未曾經歷不知窈冥恍惚乃吾身之眞景象往往槩以虚文視之惜哉當知窈冥者寂然不動吾身天地未判之時也恍惚者感而遂通吾身天地將判之時也作丹之妙莫妙乎此豈可以虚文視之哉赤龍大丹訣云無人明恍惚惟我識朦朧信乎明此者鮮有其人也先迷失軌後爲主君者其先昏昏默默深入乎窈冥之中俄頃陰極而陽生靜極而機發則面門豁開虚空迸裂一段風光破寂寥而化權歸手内也魏公此章顯言産藥之川源又極論存亡有無主客先後之祕如此詳盡無以加矣還金篇云渺邈但撈水裏月分明只採鏡中花蓋非深於道者不能識也無平不陂道之自然變易更盛消息相因終坤始復如循連環帝王乘御千秋常存無平不陂無往不復此乃道之自然也丹法靜極而動動極而靜一動一靜互爲其根亦出於自然如日月運行一寒一暑暑往則寒來寒往則暑來無非自然也夫金丹者身中之易也易窮則變變則通盛衰相禪消息相因蓋未有窮而不變變而不通者也陽始於復陰終於坤終始相接首尾相銜故曰終坤始復如循連環魏公以十二辟卦論火候又以律名辰名鋪叙而言皆譬喻也蓋輻輳即太簇俠列即夾鍾洗濯即姑洗中即中吕栖即林鍾任即南吕傷即夷則亡即亡射應即應鍾振即辰昧即未伸即申蓄即酉滅即戌閡即亥大率皆是假借蓋不必執文泥象而强生枝節也帝王乘御千秋常存謂君子終日乾乾與時偕行則眞可以歷千秋而常存也矣將欲養性延命却期審思後末當慮其先人所禀軀體本一無元精流布因氣託初人無愚智同此性也亦同此命也君子知性之不可戕賊也於是存而養之知命之不可斵喪也於是保而延之雖不假修鍊未有不安恬令終者況得修鍊之法盜天地奪造化鍊魂魄而爲一合性命而雙修豈不能長生歟夫欲求長生須求吾未生以前此身縁何而得然後可以論養性延命之道故曰審思後末當慮其先蓋人之生也以父母之氣交結而成形形乃受氣之本氣乃有形之根若氣不得形則無因而立形不得氣則無由而成故曰人所禀軀體本一無元精流布因氣託初今夫神仙之修丹以陰陽内感神氣交結於無中生有與男女胎孕之理實同其十月温養功夫眞息綿綿晝夜如一亦與嬰兒未生以前無異靈源大道歌云但看嬰兒胎處時豈解將心潛筭計專氣致柔神久留往來眞息自休休蓋嬰兒之在母胎也母呼亦呼母吸亦吸口鼻皆閉而以臍達故臍者生之根氣之蔕也吕純陽玄牝歌云窮取生身受氣初莫怪天機都泄盡人能窮取一念生身之處返本還源回光内照採藥於西南坤腹根蔕之地而與當來受氣之初相似何用他求奈何學者往往執文泥象各以己見爲是其好高者則認金丹爲禪宗遂以宗性爲玄牝以念頭動處爲一陽生以掃除妄念爲進火而竊笑延命之說爲髑髏下光景其卑下者則認金丹爲御女術遂以婦人爲鼎器以産門爲生身處以穢物爲刀圭而反譏養性之說爲蒲團上枯坐功夫一則淪於空寂一則陷於邪僻終身執而不悟深可爲之浩歎也類如雞子黑白相扶縱廣一寸以爲始初四肢五臟筋骨乃具彌歷十月脱出其胞骨弱可卷肉滑若飴黑白者陰陽二氣也凡人結胎之初由父精母血陰陽二氣假合而成渾渾沌沌類如雞子百日而男女分形然後四肢五臟筋骨乃貝及期而育脱出其胞骨弱筋柔肌軟肉滑名曰嬰兒鍊金丹者修吾身之嬰兒亦當彌歷十月翠虚篇云我昔功夫行一年六脉已息氣歸根有箇嬰兒在丹田與我形貌亦如然蓋修鍊聖胎未有不用十月功夫而可以速成者也陰陽爲度魂魄所居天有黄道爲度三百六十五其運轉也一日一周日月行乎其間往來上下迭爲出入此所以分晝夜而定寒暑也然天道密旋本無度數以日月經歷諸辰而爲行度日月往來本無定居以朝暮出入之地而爲所居明乎此然後知魏公所謂陰陽爲度魂魄所居矣夫人身中黄道即陰符陽火所行之處也即日魂月魄所居之方也有能觀天之道執天之行識陰陽之行度知魂魄之所居則周天三百六十五度循環乎一息之頃而日月出入乎呼吸之微呼爲陽吸爲陰與天道同一妙用不必求之他也陽神日魂陰神月魄魂之與魄互爲室宅古歌云日魂月魄若箇識識者便是眞仙子此所謂日魂月魄非天地有形有象顯然之日魂月魄乃吾身無形無象隱然之日魂月魄也不遇眞人指授焉能識之哉夫日爲太陽晝以舒光故稱魂月爲太陰夜以含景故稱魄然日魂屬陽謂之陽神固宜而月魄屬陰謂之陰精可也豈可以神言今皆謂之神者以其變動不居周流六虚往來旣不定上下亦無常也魂東方木也魄西方金也金木本來無二體東鄰即便是西家往來東西迭爲出入故曰互爲室宅也性主處内立置鄞鄂情主營外恒爲城郭城郭完全人物乃安于斯之時情合乾坤性之爲言靜也性主處内者端坐虚心向内觀也立置鄞鄂者捉得金精作命基也情之爲言動也情主營外者先是樞機晝夜行也恒爲城郭者八方周匝龍行火也城郭完全人物乃安者常使氣衝關節透自然精滿谷神存也于斯之時情合乾坤者晝夜河車不暫停默契大造同運行也乾動而直氣布精流坤靜而翕爲道舍廬乾天也主乎動暢萬物而達於宇内故云直惟其動而直也故使精氣流動布滿三宫而無所不至坤地也主乎靜斂萬物而藏於土中故云翕惟其靜而翕也故使精氣歸於元海而爲道舍廬大抵守於乾則動動則氣布精流守於坤則靜靜則氣聚精凝也剛施而退柔化以滋乾陽下濟於坤坤柔順而翕受之遂生藥旣經起火烹鍊則剛施而退陰柔上行而化作甘泉潤九垓矣九還七返八歸六居六七八九即水火木金也以卦言爲坎離震兌以方言爲東西南北以宿言爲虚房星昴以象言爲龜蛇龍虎以時言爲春夏秋冬以辰言爲子午卯酉皆是物也夫九曰還七曰返八曰歸同一㫖意而六獨曰居者北方坎位乃眞鉛所居之本郷也眞鉛居於此則九金八木七火三方之正氣如輻之輳轂如水之朝宗皆聚於此也王保義註䟽金碧龍虎經云日有三照月有三移日月出於東而光耀於西則西方白虎金德之正氣入於玄冥之内化而爲六戊日月入於西而光耀於東則東方青龍木德之正氣入於玄冥之内化而爲六己日月居於午而光耀於北則南方朱雀火德之正氣入於玄冥之内就土成形化而爲黑鉛常居窈冥之内爲天地萬彙之根本王君此說與魏公之言可謂異世而同符矣男白女赤金火相拘拘則水定水五行初翠虚篇云怪事教人笑幾回男兒今也會懷胎自家精血自交結身裏夫妻是妙哉蓋金丹聖胎以陰陽内感神氣交結而成曰男女曰赤白皆身中夫婦之異名也當其陰陽内感之時神與氣交猶金火之相拘金火相拘而止於北方坎水之中則神凝氣聚其水自定水定則藥物結矣還金篇云水澄凝琥珀是也水也者大丹之根源也天一生水其位在北其卦爲坎居五行之首乃吾身藥物所産之郷也人能回光返照於此出息微微入息綿綿勿令間斷則神氣歸根漸漸入而漸漸柔漸漸和而漸漸定定之之久則呼吸俱無藥物當自結也上善若水清而無瑕上善若水行其所無事金丹大道清靜無爲亦行其所無事馬丹陽語録云學道人行住坐臥不得少頃心不在道行則措足於坦途住則凝神於太虚坐則匀鼻端之息臥則抱臍下之珠久而調息無有間斷而終日如愚方是端的功夫非干造作行持也丹陽此說豈非行其所無事耶悟眞篇云謾守藥爐看火候但安神息任天然上清集云神仙伎倆無多子只是人間一味呆可謂行其所無事矣夫水之爲性靜定而矴之則清動亂而洎之則濁金丹之妙全是靜定中來還源篇云能知藥與火定裏見丹成蓋未有不定而得之者也道無形象眞一難圖變而分布各自獨居有物混成先天地生吾不知其名故彊字之曰道無形可求無象可覩矧可得而畫圖哉昔廣成子之告黄帝曰至道之精窈窈冥冥至道之極昏昏默默夫當其窈冥昏默之際一念不生萬慮俱泯渾渾淪淪如太極之未分溟溟涬涬如兩儀之未兆惟此一物湛兮獨存如清淵之印月寂然不動如止水之無波不知孰爲鉛孰爲汞夫是謂之眞一迨夫時至氣化變而分布則輕清者騰而在上重濁者矴而在下於是坎宫有鉛離宫有汞而向之所謂渾渾淪淪溟溟涬涬者至此分而爲二而各自獨居矣復命篇云一物分爲二能知二者名鼎爐藏日月滴漏已三更蓋謂此也夫金丹大藥孕於先天産於後天其妙在乎太極將判未判之間靜已極而未至於動陽將復而未離乎陰於此合天地之機識結丹之處知下手之訣則恍惚之中尋有物窈冥之内吸眞精方知大道於無中生有而眞一之妙果不可以畫圖也然則眞一之妙終無可以示人歟曰有陽燧以取火非日不生光方諸非星月安能德水漿二氣至懸遠感化尚相通何況近存身切在於心胸陰陽配日月水火爲效徵周禮秋官司烜氏掌以木遂取明火於日以鑒取明水於月淮南子云方諸見月則津而爲水高誘注云方諸陰燧大蛤也熟摩拭令熱向月則有水生且地之去天不知幾千萬里日月懸於空中去地亦不知幾千萬里而陽燧見日則得火方諸見月則得水奚爲感化相通如此其速哉何況近存身切在於心胷身中自有水火心中自有藥材得不回光返照以求其感化之妙乎乃若八月十五月明之夜深山之兔結胎滄海之蚌結珠抑何爲感化相通如此其妙哉人生天地間爲萬物之靈反不能盜天地奪造化曾兔蚌之不若學仙者亦嘗於此致意否乎大抵陰陽得類自然感化今魏公以陽燧取火方諸取水爲證欲使學者潛心内觀於無中生有其感化亦如是也還丹篇云二氣纔交甘雨降兩神相會玉漿流信有之矣夫鑑之與珠皆光明瑩潔之物表裏透徹無纖毫痕瑕故能拘日月之光聚爲一粟之明雖寥廓至遠隨即感應然而定則聚聚則有動則散散則無人能虚心凝神泰然内定無一毫之雜想以吾自己日月聚光不散久之氣定時正自有奇效要之至道不遠恒在目前亦猶磁石吸鐵隔礙潛通極爲切近但世人迷而忘返不能求之於内爾寗玄子詩云慇懃好與師資論不在他途在目前又云當時一句師邊得密密垂簾仔細看可謂切近之甚矣耳目口三寶固塞勿發揚陰符經云九竅之邪在乎三要何謂三要耳目口是也今魏公以三要爲三寶而曰固塞勿發揚者欲修鍊之士斂耳目之聰明緘喉舌之眞氣盡收歸裏不放出外如寶貝之珍藏也豈不見釜甑炊米關蓋密於上薪火然於下外無纖毫之罅隙内有熱氣之盤鬱俄頃之間米皆烝熟爲飯今夫入室修鍊須是收視返聽閉口含津勿使纖毫眞氣漏泄然後至藥滋生大丹成熟若使耳爲聲引目爲色牽重樓浩浩而出三者皆發揚而無餘何還丹之可求哉眞人潛深淵浮游守規中眞人即元神也深淵即太淵也異名衆多今試舉而言之曰泥丸宫流珠宫玉清宫紫清宫翠微宫太微宫太一宫太玄關玄門玄宫玄室玄谷玄田砂田第一關都關天關天門天谷天田天心天輪天軸天源天池天根天堂天宫乾宫乾家交感宫離宫神宫神室神關神京神都玄都故都故郷故丘故林故宫紫府紫庭紫金城紫金鼎朱砂鼎汞鼎玉鼎玉室玉京玉宇瑶峯第一峰最高峯祝融峰崘崐頂崆峒山蓬萊上島上亰上宫上玄上元上谷上土釜上丹田其名雖衆其實則一也翠虚篇云天有七星地七寶人有七竅權歸腦太古集云金丹運至泥丸穴名姓先將記玉都是故帝一回元之道泝流百脉上補泥丸腦實則神全神全則形全也今魏公謂眞人潛深淵浮游守規中者隨眞息之往來任眞氣之升降自朝至暮元神常棲於泥丸也黄庭經云子欲不死修崘崐靜中吟云我修崐崘得眞訣復命篇云會向我家家裏栽培一畒天田還元篇云悟道顯然明廓落閑閑端坐運天關此乃至簡至易之道但撥動頂門關棙而匀匀地默默舉三宫自然升降百骸萬竅自然通達有如萬斛之舟而惟用一尋之木發千鈞之弩而惟用一寸之機且是不費絲毫力但昩者自不信爾或存老君在泥丸宫中而默朝之又畫蛇添足矣旋曲以視覽開闔皆合同爲己之軸轄動靜不竭窮皇極經世書云天之神栖於日人之神發於目大矣哉人之神發於目也生身處此物先天地生没身處此物先天地没水火木金土之五行攅簇於此肝心脾肺腎之五者鍾靈於此唾涕精津氣血液之七物結秀於此其大也天地可容其小也纖塵不納兹非吾一身中之大寶也歟内指通玄祕訣云舍光便是長生藥變骨成金上品仙又云撮聚雙睛在眼前燒成便可㸃金仙如此直指示人而學者猶或未悟何其昧之甚耶蓋三宫升降上下往來無窮無已猶車之有輪也其運用在心猶輪之有軸也其鈐鍵在目猶軸之有轄也金華詩云仙童唯守洞門立三島眞人長往還其說是也離氣内榮衞坎乃不用聰兌合不以談希言順鴻濛三者旣關楗緩體處空房離氣内榮衞者收目内視而光不露也坎乃不用聰者返耳内聽而聰不泄也兌合不以談希言順鴻濛者安閑心曲冷如灰默默無言護聖胎也三者既如此關楗又當緩體處於空房斯可以爲修鍊也緩體者舒徐容與無勞爾形也處空房者入靜室也其中不著他物惟設一香一燈一几一榻而已坐處不欲太明太明則傷魂不欲太暗太暗則傷魄蓋魂好明魄好暗明屬陽暗屬陰是故翠虚篇謂室宜向木對朝陽兌有明窗對夕光而又謂莫息明燈并百和也且夫入靜室修鍊乃一至大因縁誠非細事豈不見悟眞篇云此道至神至聖憂君分薄難消是豈無德行者所能妄覬也哉然靜室亦不必拘以山林或在𠪨中或居道郷但得所託無往不可或疑悟眞篇記有通邑大都依賴有力者之語蓋以大藥未成難當寒暑於一年之内四季要衣眞氣未完而尚有飢渴於一日之内三餐要食如伍達靈之得張程二友張紫陽之得馬陸二公王沖熙之得富韓公李長源之得筠陽親舊於是咸底厥成實爲周天火候須用一片功夫不可間斷必得同志有力者爲之保護供給服事俾免飢寒困苦之竊其氣乃可以專志修鍊也陰眞君金液還丹歌云不得地莫妄爲悟眞篇云命寶不宜輕弄得斯道之正傳者當自知之委志歸虚无念念以爲常委志歸虚无者心無雜念意不外遊而鎮日翫眞空也念念以爲常者念念相續勿令間斷而長將氣度隨天道也或疑此法與禪學稍同殊不知金丹於無中生有養就嬰兒蓋非塊然面壁槁木死灰之謂也白紫清語録云修丹口訣第一是聚氣凝神常常握固即聚氣念念守默即凝神學者若徒知無心無念而不知聚氣凝神則墮於頑空又安得胎仙之成也證驗自推移心專不縱横修鍊有三分功夫則有三分證驗有十分功夫則有十分證驗若能勤而行之夙夜不休以至百日功靈則兩腎如湯煎膀胱如火然目有神光耳有靈響鼻有異香口有甘津此身融融液液證驗逐日推移所貴乎心專而不可縱横者實恐燭理未透而於靜定中似夢非夢之際或爲魔境之所攝也指玄三十九章云不可著他境物去一心專守虎龍蟠其說是已丁靈陽心性訣云若靜中抑按功深或是忽見仙佛鬼神樓臺光彩一切境界見於目前大不得起心生於憎愛師父云自己性中空廓任他千變萬化大抵一心無動萬邪自退但心火不生則神氣相聚子母相守自然水火旣濟水見火而自然化爲氣上騰薰蒸關竅無所不至自然百脉調攝四大沖和謹愼守之道自相契王栖雲盤山語録云修行之人靜中境界甚有多般皆由自己識神所化因靜而現誘引心君豈不聞古人云凡所有相皆是虚妄心欲遣識識神尚在便化形像神頭鬼面惑亂心主若主不動見如不見體同虚空無處捉摸自然消散關尹子云人之平日目忽見非常之物者皆精有所結而使之然人之病日目忽見非常之物者皆心有所歉而使之然苟知吾心能於無中示有則知吾心能於有中示無但不信之自然不神或曰厥識旣昏孰能不信我應之曰如捕蛇師心不怖蛇彼雖夢蛇而無畏怖故黄帝曰道無鬼神獨往獨來即此諸說觀之則知魏公所謂心專不縱横誠爲修鍊者之要端也寢寐神相抱覺悟候存亡精生有時時至神知百刻之中切忌昏迷須是行住坐臥綿綿若存如雞抱卵煖氣不絶方可謂之修鍊至於眞積力久功夫純熟晝夜如一更無夢覺之異雖當寢寐之間神亦不昩而精生之時神與天通雖不待唤醒亦自覺悟夏雲峯云自然時節夢裏也教知是也今魏公謂寢寐神相抱覺悟候存亡欲修鍊之士常惺惺也蓋金丹大藥由神氣交結而成乃是無質生質結成聖胎辛勤保護十月如幼女之初懷孕似小龍之乍養珠蓋神氣始凝結極易踈失寢寐之際須當與神相抱切不可昏迷而沉於夢境覺悟之後惟恐火冷而丹力或遲故必候其存亡要在一日十二時中無晝無夜念兹在兹然後功夫純粹而藥材不至消耗火候不至虧闕焉可須臾離哉顔容寖以潤骨節益堅强顔容寖以潤骨節益堅强者至寶藴於中自然精華發於外亦猶玉在山而木潤淵生珠而崖不枯也辟却衆陰邪然後立正陽悟眞篇云群陰剥盡丹成熟跳出樊籠壽萬年夫人之一身徹上徹下凡屬有形者無非陰邪滓濁之物神仙修鍊之法蓋是無中生有奪天地一㸃眞陽結成丹頭於是晝夜運火鍊去陰氣鍊之十月而胎圓三年而功成然後體變純陽化形而仙也修之不輟休庶氣雲雨行淫淫若春澤液液象解冰從頭流達足究竟復上升往來洞無極怫怫被谷中内指通玄祕訣云晝夜無休作大丹精華透頂百神攅蓋一年處室夜以繼日功夫不輟自然效驗顯發其和氣周匝於一身溶溶然如山雲之騰太虚霏霏然似膏雨之遍原野淫淫然若春水之滿四澤液液然象河冰之將欲釋往來上下百脉沖融被於谷中暢於四肢拍拍滿懷都是春而其狀如微醉也入藥鏡云先天氣後天氣得之者常似醉靈光集云顛倒循環似醉人不憂不喜内全眞是皆丹功之靈驗也丁靈陽回光集云若一念無生則自然丹田氣海之内太陰之精度過尾閭穴把夾脊雙關風府泥丸返下明堂鼻柱入於華池化爲甘津嚥下重樓澆灌五臟六腑至丹田上下流轉𠑽盈四大周而復始無不遍矣如其朝行暮輟用志弗專又安能進於是哉反者道之驗弱者德之柄反者反復也道德經云致虚極守靜篤萬物並作吾以觀其復蓋修丹效驗出乎虚之極靜之篤與天地冥合然後元氣從一陽而來復若使虚不極靜不篤則爲山九仞功虧一簣從何而得效驗哉弱者柔弱也道德經云專氣致柔能如嬰兒乎蓋修丹本柄在乎持其志無暴其氣如嬰兒之柔弱方可若使志無所守氣無所養則所得未錙銖所喪已山崖將何以爲本柄哉芸鋤宿汙穢細微得調暢諸慮旣息則百骸俱理凶氣消散則道氣常存譬如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者伸矣今夫神仙之修丹芸鋤宿穢驅遣鬼尸安靜六根空其五藴於正念中清靜光明虚白晃耀乃得五臟清凉六腑調泰三百六十骨節無有滯礙八萬四千毫竅皆通暢也濁者清之路昏久則昭明翠虚篇云精神冥合氣歸時骨肉融和都不知當斯之時三田氣滿恍然如在醉夢中得不謂之昏濁乎學者到此境界切不可放倒當知昏久則必明濁久則必清迨夫時至氣化而九天音信散胚腪則神水湛湛華池靜白雪紛紛飛四山七寶樓臺十二層樓前黄花深可觀分分朗朗盡見於恍惚之間豈終於昏濁而已哉周易參同契發揮卷之六
