front:
  text: 周易參同契發揮卷之九止九
  hash: sha256:41f3fcdebd0412f61df0b01cf5c098b80a0379baba90aaf9eed07d9616905628
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0022_HFL_009-001a, image: hfl/0627/0627-044.png}
body:
  text: 林屋山人全陽子俞琰述下篇第二先白而後黄兮赤色通表裏名曰第一鼎兮食如大黍米先白而後黄者初如玉液飛空雪漸見流金滿故廬也赤色通表裏者靈光神焰燒天地風雷雲霧盈山川也名曰第一鼎者以九轉火候言之此爲起初第一轉也食如大黍米者丹頭纔方結就僅如黍米之大也自然之所爲兮非有邪僞道金丹大道古仙往往以爲自然夫旣曰自然則有何法度有何口訣但付之自然足矣又安用師授爲哉曰非然也大丹之法至簡至易其神機妙用不假作爲不因思想是故謂之自然然必收視返聽潛神于内一呼一吸悠悠綿綿不疾不緩勿令間斷然後神歸氣中氣與神合交結成胎蓋非一味付之自然也金碧龍虎經云自然之要先存後亡夫先存後亡者先存神入於氣穴而後與之相忘也如是爲之則神自凝氣自聚息自定即非澄心入寂如槁木死灰也蓋澄心入寂如槁木死灰以之入道則可以之修眞則未也指玄篇云自然功績自然偏說自然來不自然蓋謂此也乃若時至而氣化機動而籟鳴則於自然之中又有烹鍊進火之訣存焉悟眞篇云始於有作人爭覺及至無爲衆所知但見無爲爲要妙豈知有作是根基學者苟未知丹法之有作而便求無爲自然是何異於不耕不耘而坐待豐稔者哉若山澤氣烝兮興雲而爲雨天降時雨山川出雲人皆知其然矣而不知在天之雨即山川之氣所化蓋山澤之氣烝而上升於天於是化而爲雲由其陰陽和洽所以成雨及其成雨則又還降於地吾身之金丹作用與此更無少異魏公設此象以示後學可謂巧於譬喻矣泥竭遂成塵兮火滅化爲土泥乃近水之土性本重滯而居下及曝而乾之則土性竭而燥裂化爲埃塵矣火乃虚明之物因麗於木而有煙焰及煙消焰冷則火性滅而煨燼化爲灰土矣知乎此然後可以論陰陽反覆之道若檗染爲黄兮似藍成緑組皮革煑爲膠兮麴蘖化爲酒同類易施功兮非種難爲巧悟眞篇云萬般非類徒勞力爭似眞鉛合聖機蓋眞汞得眞鉛則氣類相感妙合而凝猶夫婦之得耦故謂之同類類同則如檗之染黄藍之染緑皮以爲膠麴以爲酒不勞於力自然成眞若舍此而别求他物則非其種類徒費功夫爾惟斯之妙術兮審諦不誑語傳於億世後兮昭然而可考焕若星經漢兮昺如水宗海世間旁門小術何啻三千六百家惟此一門乃天寶大羅飛仙金液九轉大還丹清靜無爲之妙術其法至簡至易雖愚夫愚婦得而行之亦可以超凡入聖是以天戒至重不許輕授於非其人而世之參學者不有夙縁契合未易遭遇也今夫魏公不祕天寶作此三篇之書言言詳審字字諦當焕若星之經漢昺如水之宗海眞億代學仙者之龜鑑也指玄篇云多少經文句句眞流傳只是接高人悟解篇云非干大道神仙惜自是凡流不志心或者乃信盲師之說而妄謂神仙誑語神仙肯誑語耶夫古仙留丹書於世蓋將接引後學其間論議昭然可考夫遇者固可於此探討旣悟者亦可於此印證古之得道者莫不皆然劉海蟾謂恣遊洞府遍討仙經幸不違盟果諧斯願楊虚白謂名山異境歷斗而靡不經遊祕訣神方淵奥而素曾耽翫陳默默謂歷覽群書參叩高士足跡幾類雲水反而思之所得盡合聖詮蓋未有自執己見而不訪道友獨守師說而不讀丹書者也善乎施栖眞之說曰古人上士始也博覽丹書次以遍參道友以道對言所參無異論以人念道所師無狂徒後之學者豈可謂口訣不在紙上而竟不留念哉若曰我自有師傳密㫖其言藥物火候乃古今丹書之所無而參同契之所不言則亦妄人也已矣思之務令熟兮反覆視上下千周粲彬彬兮萬遍將可覩神明或告人兮心靈忽自悟探端索其緒兮必得其門户讀書百遍其義自見百遍且然況千遍萬遍哉是故誦之萬遍妙理自明縱未得師授口訣久之亦當自悟其悟多在夜深或靜坐得之蓋精思熟味反覆玩誦蓄積者多忽然爆開便自然通此之謂神明或告人兮心靈忽自悟也管子曰思之思之又重思之思之不通鬼神將通之非鬼神之力也精誠之極也此說是已近世張紫陽以悟眞篇授扶風馬處厚侍郎且囑之曰願公流布此書當有因書而會意者故其自序有云此悟眞篇中所歌詠大丹藥物火候細微之旨無不備悉儻好事者夙有仙骨覩之則智慮自明可以尋文悟解其諄諄勉後學之辭與魏公同一意嚮蓋所謂神告心悟畢竟有此理也不然二公何苦立此空言以厚誣天下後世也哉天道無適莫兮常傳與賢者譚景升以化書授宋齊丘齊丘殺景升并竊其書自名之尋亦不得善終此傳非其人而彼此致禍者也吴世雲以道授許旌陽旌陽又得諶母之至道復授於吴厥後皆得道成此傳得其人而彼此致福者也蓋天道無親常與善人苟非其人道不虚行豈得無禍福於傳授賢否之間乎嗚呼世道不古愈降愈下善人吾不得而見之矣得見有恒者斯可矣鼎器歌圓三五徑一分圓三徑一此吾身中之寶鼎也三才位其中五行運其中鉛汞土居其中陰符經謂爰有其器是生萬象即此物也金丹種種玄妙皆不出乎此若曰不在吾身而在他人則非清靜之道矣口四八兩寸脣口四八者四象八卦皆在其中也兩寸脣者具兩儀上下之界分也長尺二厚薄匀鼎長一尺二寸以應一年十二月周天火候鼎身腹令上中下等均匀不可使之一偏也腹齊正坐垂温坐之時以眼對鼻以鼻對臍身要平正不可欹側開眼須要半垂簾不可全閉全閉則黑山鬼窟也氣從鼻裏通關竅不可息麤息麤則火熾火熾則藥飛矣陰在上陽下奔陰上陽下水火旣濟也還源篇云娑竭海中火崑崙山上波誰能知運用大意要黄婆向微黄婆運用之功則水曰潤下火曰炎上何由旣濟哉首尾武中間文首尾晦朔也中間月望也晦朔乃陰極陽生之時故用武火月望乃陽極陰生之時故用文火然所謂晦朔月望亦譬喻耳却不可只就紙上推究也始七十終三旬二百六善調匀三旬即三十也七十三十與二百六十合之則三百六十應一年周天數也修鍊而至於百日數足則聖胎方靈聖胎旣靈此後二百六十日善能調匀氣候常使暖氣不絶則丹功自成翠虚篇云温養切須常固濟巽風常向坎中吹行坐寢食總如如惟恐火冷丹力遲他無艱辛也陰火白黄芽鉛自子至巳爲陽火之候自午至亥爲陰火之候酉居西方西方屬金故曰陰火白悟眞篇云蟾光終日照西川是也土中産鉛鉛中産銀銀自鉛中鍊出結成黄芽名爲眞鉛金碧龍虎經云鍊鉛以求黄色是也兩七聚輔翼人兩七東方蒼龍七宿西方白虎七宿也人中央人位也兩七聚輔翼人者龍蟠虎媾會聚於中央也若然則南海之儵北海之忽相遇於渾沌之地矣此所以烹而成丹也悟眞篇云三家相見結嬰兒又曰五行全要入中央其斯之謂歟贍理腦定昇玄腦爲上田乃元神所居之宫人能握元神栖于本宫則眞氣自昇眞息自定所謂一竅開而百竅齊開大關通而百關盡通也作丹之時脱胎而入口功成之後脱胎而出殻皆不外此靜中吟云我修崘崐得眞訣每日修之無斷絶一朝功滿人不知四面皆成夜光闕兹蓋修持日久功夫贍足非一朝一夕之故也子處中得安存嬰兒處於胎中得坤母慇懃育養則得以安存矣來去遊不出門門者玄牝之門也來去遊者呼吸之往來也往來不出乎玄牝之門則陰陽氣足自通神也漸成大情性純行住坐臥綿綿若存則日復一日漸凝漸聚胎氣旣凝嬰兒顯相而情性愈純熟也却歸一還本元大丹之道抱元守一而已其始入也在乎陰陽五行其終到也在乎混沌無極此之謂歸一還元也善愛敬如君臣一年處室夙夜匪懈愛之敬之如臣子之事上也至一周甚辛勤還金篇云快活百千劫辛勤一二年自古蓋未有不辛勤入室一年而能平地登仙者也靈源大道歌云他年功滿乃逍遥初時修鍊須勤苦勤苦之中又不勤閑閑只要養元神其說有味哉有味哉密防護莫迷昏翠虚篇云晝運靈旗夜火芝抽添運用切防危若無同志相規覺時恐爐中火候非蓋道高一寸魔高一尺百刻之中切忌昏迷在修鍊之士常惺惺耳途路遠極幽玄若達此會乾坤運用於玄牝之間一日行八萬四千里之路豈不途路遠耶其大無外其小無内迎之不見其首隨之不見其後豈不極幽玄耶人能達此則可以驅馳造化顚倒陰陽會吾身之乾坤矣刀圭霑靜魄魂刀圭丹頭也魂魄龍虎也運入崐崘峯頂而化爲玉漿流入口則風恬浪靜虎伏龍降也得長生居仙村丹成之後散誕無拘繫翛然道轉高不問山林之與朝市皆可以栖隱今魏公不曰在市居朝而曰居仙村者畢竟山林是靜縁也樂道者尋其根根者天地之根也金丹之基也翠虚篇云一纔識破丹基處放去收來總是伊似非至人指授莫有識之者樂道之士有能尋而得此抑何其幸耶審五行定銖分五行順則生人逆爲丹用法度不可不審也火數盛則燥水銖多則濫斤兩不可不定也諦思之不須論深藏守莫傳文悟眞篇云近來透體金光現不與凡人話此規靜而思之此道乃千聖所祕得之者但藏之肺膺自受用足矣何乃輕泄慢漏孜孜焉語人哉雖然自爲計則得矣其如天下後世何此參同契所以作御白鶴兮駕龍鱗遊太虚兮謁仙君受圖籙兮號眞人胎圓功成之後須當調神出殻或跨白鶴或乘火龍超度三界難徑上元始天自此逍遥快樂與天齊年號曰眞人雖然凡所有相皆是虚妄何白鶴龍鱗之有哉若言他是佛自己却成魔又奚仙君之有哉當知白鶴龍鱗皆自我神通變化而仙君亦是自己三清何勞上望或者不達此理乃晝夜妄想以待天詔至有爲黑虎所銜巨蟒所吞者豈不痛哉宋人鑿井而得一人之力相傳以爲人自土中出許旌陽舉家成道後人以爲拔瓦屋入於雲中甚矣世之好譎怪也然此可爲智者道難與俗人言其維哲人告之話言順德之行其維愚人覆謂我僣吾安得夫圓機之士而與之極論哉吁序參同契者敷陳梗槩不能純一泛濫而說纖微未備闊略髣髴今更撰録補塞遺脱潤色幽深鉤援相逮旨意等齊所趣不悖故復作此命三相類則大易之情性盡矣參三也同相也契類也謂此書借大易以言黄老之學而又與爐火之事相類三者之陰陽造化殆無異也魏公憫後學之不悟於是作此一書以敷陳大道之梗槩然恐漏泄玄機遂不敢成片敷露未免傍引曲喻泛濫而說又恐闊略髣髴不能備悉纖微復述鼎器歌於後凡篇中文辭之遺脱者皆於此歌補塞之義理之幽深者皆於此歌潤色之使三篇之言鉤援相逮旨意等齊庶幾後之覽者便得徑路不悖其所趣也翠虚篇云道要無中養就兒箇中别有眞端的都縁簡易妙天機散在丹書不肯泄今夫魏公之所以敷陳不已至于再至于三其意不過亦如此不然則大丹之要一言半句足矣又安用覼縷爲哉大易情性各如其度黄老用究較而可御爐火之事眞有所據三道由一俱出徑路道無不在頭頭俱是三聖如其度以作易黄老究其妙以作丹爐火盜其機而爲燒鍊之術或著於言或修於身或寓於物此皆仰觀俯察明陰陽配合之法遠取近用得造化變通之理於是有此三道三道殊塗而同歸此其所以爲三相類枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤道者萬物之本猶木之根株也發而爲枝莖於是有三聖之易散而爲華葉於是有爐火之術至於結爲果實而返本還源此黄老之所以不失其素而修鍊金液内丹養成聖胎也魏公以此三者互相類之道鼎立而言豈故好爲此鄭重實欲使學者洞曉陰陽深達造化也其言出於誠心厥亦審而不誤矣鄶國鄙夫幽谷朽生挾懷朴素不樂權榮栖遲僻陋忽略利名執守恬淡希時安平宴然閒居乃撰斯文魏公生於東漢名伯陽號雲牙子會稽上虞人也今言鄶國者隱其辭也本高門之子世襲簪裾惟公不仕修眞潛默養志虚無博贍文詞通諸緯候恬然守素惟道是從每視軒裳爲糠粃焉不知師授誰氏而得大丹之訣乃約周易撰此參同契三篇又恐言之未盡復作鼎器歌以補塞三篇之遺脱潤色三篇之幽深密示青州徐景休從事徐乃隱名而註之至桓帝時復以授同郡淳于叔通遂行於世嗟夫是書闡明道要發露天機其體認眞切如此其講貫該博如此兹蓋非苟知之亦允蹈之者也而魏公猶以鄙夫朽生自處至人之謙晦蓋如此歌叙大易三聖遺言察其所趣一綂共倫務在順理宣耀精神神化流通四海和平表以爲曆萬世可循序以御政行之不繁引内養性黄光自然含德之厚歸根返元返在我心不離己身抱一無舍可以長存配以服食雄雌設陳挺除武都八石棄捐審用成物世俗所珍羅列三條枝莖相連同出異名皆由一門伏羲畫八卦因而重之文王設卦觀象繫辭焉以明吉凶孔子又賛之以十翼蓋將順性命之理而彌綸天地之道也是故表以爲曆則坦然可循是爲萬世法序以御政則行之不繁足爲百王之軌範易道可謂大矣黄帝觀天之道而執天之行老子含德之厚而比於赤子陰符三百餘字道德五千餘言反覆議論無非發明造化自然之妙是故世之修丹者必以黄老爲宗黄老可謂至矣乃若服食之法得其陰陽配合之妙以制伏鉛汞則二黄之類先可掃除其餘衆石亦皆可棄審其用而煆鍊之或爲黄或爲白則成物於天地間豈不爲世俗所珍爐火可謂奇異矣大易也黄老也爐火也三條羅列枝莖相連同出異名皆由一門此之謂三相類非徒累句諧偶斯文殆有其眞礫硌可觀使予敷僞却被贅愆命參同契微覽其端辭寡意大後嗣宜遵魏公作鼎器歌以繼於三篇之後其文字礫礫硌硌粲然可觀豈徒抽黄對白諧耦斯文以爲觀美哉殆有至眞之理存乎其間也若謂以妄僞之說誑惑後人則稍知道者所不肯爲曾謂魏公爲之乎又況天鑑昭昭禍福不遠何苦以僞言誤天下後世而自取欺天之罪哉蓋鼎器歌之作所以補塞三篇之遺脱潤色三篇之幽深也其辭雖三字爲句似乎簡短其意則廣大兼該靡所不備眞所謂坦然明白可舉而行者也後學不於此而取信將奚之焉委時去害依託丘山循遊寥廓與鬼爲鄰化形爲仙淪寂無聲百世一下遨遊人間敷陳羽翮東西南傾湯遭阨際水旱隔并柯葉萎黄失其華榮各相乘負安穩長生此乃魏伯陽三字隱語也委與鬼相乘負魏字也百之一下爲白白與人相乘負伯字也湯遭旱而無水爲昜阨之厄際爲阝阝與昜相乘負陽字也魏公用意可謂密矣元豐間吕吉甫守單州吕洞賔至天慶觀索筆書二詩其一云野人本是天台客石橋南畔有住宅父子生來只兩口多好歌而不好拍時吕守之壻余中釋之曰天台客賔也石橋洞也兩口吕也歌而不拍乃吟詩也吟此詩者其吕洞賔乎是知古仙立言於世惟務發明斯道以接引後人初不欲彰己之名也讚序參同契者辭陋而道大言微而㫖深列五帝以建業配三皇而立政若君臣差殊上下無準序以爲政不至太平服食其法未能長生學以養性又不延年至於剖析陰陽合其銖兩日月弦望八卦成象男女施化剛柔動靜米鹽分判以易爲證用意健矣故爲立注以傳後賢惟曉大象必得長生强己益身爲此道者重加意焉此篇以讚序名乃後人讚序魏公此書之辭又曰故爲立注以傳後賢其非魏公本文也審矣朱晦菴云或云後序或云魏君讃詳其文意乃是注之後序彭序云魏君密示青州徐從事令箋注徐隱名而注之至桓帝時復傳授於同郡淳于叔通因得行于世恐此是徐君語也其注則不復存矣彭眞一云按諸道書或以眞契三篇是魏公與徐從事淳于叔通三人各述一篇斯言甚誤且公於此再述云今更撰録補塞遺脱則公一人所撰明矣況唐蜀眞人劉知古者因述日月玄樞論進于玄宗亦備言之則從事箋注淳于傳授之說更復奚疑愚嘗紬繹是說竊歎世代寥遠無從審定是耶非耶皆不可知忽一夕於靜定中若有附耳者云魏伯陽作參同契徐從事箋注簡編錯亂故有四言五言散文之不同旣而驚悟尋省其說蓋上篇有乾坤坎離屯蒙中篇復有乾坤坎離屯蒙上篇有七八九六中篇復有七八九六上篇曰日辰爲期度中篇則曰謹候日辰上篇曰震受庚西方中篇則曰昴畢之上震出爲徵其間言戊己與渾沌者三言三五與晦朔者四文義重復如此竊意三人各述一篇之說未必不然而經註相雜則又不知熟爲經熟爲註也愚欲以四言五言散文各從其類分而爲三庶經註不相泿殽以便後學參究然書旣成不復改作姑誦所聞於卷末以俟後之明者周易參同契發揮卷之九
