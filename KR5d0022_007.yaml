front:
  text: 周易參同契發揮卷之七止七
  hash: sha256:899ec65ceb31c714f74d784dc2230bcc25fa5331964da79f97b3e54c5d660be7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0022_HFL_007-001a, image: hfl/0626/0626-130.png}
body:
  text: 林屋山人全陽子俞琰述中篇第三世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲不任杖聾者聽宫商沒水捕雉兔登山索魚龍植麥欲穫黍運規以求方竭力勞精神終年不見功金丹大道以積精纍氣而成斷不可以一蹴到也片餉結胎百日立基一年入室三年鍊養自有節次功夫决無今日遇師明日便能升仙之理奈何世之學者往往惑於道聽塗說不審道之淺深不擇師之邪正務求速效惟好小術或知其一不知其二或得其體不得其用局於偏見自以為足甚至張皇邪說而反謗正道穿鑿真經以取信末學妄以授妄迷以傳迷如此者多矣間有聰明之士則又不肯屈己參訪惟鑽尋故紙以望得悟何異盲者之不任杖哉其愚暗之人不通至理强以臆說紐合丹書何異聾者之聽宫商哉乃若以臍內為玄關此猶捕雉兔而入水者也以兩目為華池此猶索魚龍而登山者也他如學採戰以望不死坐頑空而覬長生豈非植麥欲穫黍者乎運規以求方者乎是皆執迷不悟空費心力遂至皓首茫然迄無成效惜哉欲知服食法至約而不煩指玄三十九章云內裏明來是至真外邊入者即非親謂丹在身中不必求之外也今魏公乃有服食之說得非丹自外來而吞入口歟曰非也丹生於坎中因火逼而出位遍歷三宫降而入口故曰服食也至約而不煩者口訣至簡至易也夫既謂之至簡至易則參同契不作可也何為連編纍牘而不已耶又嘗見悟真篇云大丹之法至簡至易雖愚暗小人行之立超聖地而又云鍊金丹者須洞曉陰陽深達造化何耶吁有說矣蓋愚暗小人心無忖量易於取信墍有所遇則徑直奉行雖無講明亦可聰明之士則不然見聞墍廣疑慮常多有一未明必欲窮究而後已苟不使之洞究陰陽造化之原彼將中道生疑一為旁門近似之說所撼則未免投杼下機而反謂吾道之不真矣此所以不得不為之講明也然則魏公之作是書也雖欲不鄭重其辭其可得乎太陽流珠常欲去人卒得金華轉而相因化為白液凝而至堅太陽流珠乃靈汞也靈源大道歌云此物何曾有定位隨時變化因心意在體感熱則為汗在鼻成風則為涕在腎感合則為精在眼感悲則為淚可見其常欲去人也金華即真鉛也汞得真鉛則轉而相依自然不飛不走留戀于內而化為金液凝而至堅也金華先倡有頃之間解化為水馬齒闌干陽乃往和情性自然真鉛生於坎位先液而後凝凝作黃芽故有馬齒闌干之喻翠虛篇云丹頭只是先天氣鍊作黃芽發玉英是也夫鉛乃君也汞乃臣也鉛先動汞應之猶君倡而臣和也鉛屬金汞屬木木性愛金金情戀木陰陽得類自然感合也迫促時陰拘畜禁門迫促時陰者時節正時須急採也拘畜禁門者採得歸來爐裏煆也還源篇云但要合天機誰識結丹處何謂合天機迫促時陰是也何謂結丹處拘畜禁門是也法當迫近陰極之時迎一陽初動之機以進火不可過之亦不可不及此之謂迫促時陰也進火之際促百脉以歸源窮九關而徹底君火相火民火皆拘聚於黃宫而煆成至寶此之謂拘畜禁門也入藥鏡云天地靈造化慳苟非迫促時陰拘畜禁門安能盜其機哉慈母育養孝子報恩遂相銜咽咀嚼相吞嚴父施令教敕子孫真鉛之生也孕於坤母之胞猶慈母之育養也逮夫飛上乾宫擒制真汞與真汞交結而成丹則又復回於坤母之舍此即孝子之報恩慈烏之反哺也然非炎火為之猛烹極煅則真鉛不能飛起此嚴父所以施教敕之令也玉芝書云鉛不得火則不飛汞不得鉛則不結蓋有細微之旨豈可以容易言哉五行錯王相据以生火性消金金伐木榮金生水木生火此常道之順五行也今以丹法言之則木與火為侣火反生木金與水合處水反生金故曰五行錯王相据以生也火性銷金者運南方離宫之火以鍊北方水中之金也金伐木榮者運北方水中之金以制南方火中之木也三五為一天地至精可以口訣難以書傳三者水一火二合而成三也五者土也三五為一者水火土相與混融化為一氣也斯時也玄黃相雜清濁未分猶如天地渾沌之初少焉時至氣化無中生有則窈窈冥冥生恍惚恍恍惚惚結成團而天地之至精孕於其中矣屈突神和云若明三五一且作地行仙其妙須是口傳心授難以盡形於毫楮也子當右轉午乃東旋卯酉界隔主客二名子當右轉者自西方轉於子位而虎向水中生也午乃東旋者自東方轉於午位而龍從火裏出也子午即南北也南北即水火也卯酉即東西也東西即金木也右轉左旋一伏一起則水火相交金木不間隔矣還元篇云輪回玉兔與金雞道在人身人自迷滿目盡知調水火到頭幾箇識東西蓋東西之與卯酉皆金木之異名即非天地方位亦非人身左右然又不可舍吾身而索之他也嗟夫近來世上人多詐盡著布袍稱道者問他金木是何般噤口不言如害啞苟非遇師真指授則徒自臆度而已終亦莫能知也龍呼於虎虎吸龍精兩相飲食俱相貪併龍南方離龍也虎北方坎虎也作丹之時驅龍下呼於虎虎乃吞吸龍精一呼一吸兩相飲食於是併合為一指玄三十九章云若解相吞歸一處神仙頃刻不勞功其法至神聖極容易但恐學者不識龍虎為何物爾熒惑守西太白經天殺氣所臨何有不傾熒惑守西者火入金鄉也太白經天者金過南方午位而出現也作丹之時運神火照入金鄉金被火逼遂飛騰而起現於南方還金篇云沉歸海底去抱出日頭來是也金即真鉛也殺氣所臨何有不傾者真鉛飛上擒真汞真汞自出投真鉛元陽子大道歌云白虎自兹相見後流珠那肯不相從是也貍犬守鼠鳥雀畏鸇各得其性何敢有聲神入氣而為胎如貍犬之守鼠藥得火而成丹如鳥雀之畏鸇由其物類相制一見則自然降伏此所以不敢作聲也不得其理難以妄言竭殫家産妻子飢貧自古及今好者億人訖不諧遇希有能成廣求名藥與道乖殊還金篇云不達陰陽祖徒勞更議玄況乎不得其理又安可以臆見妄言哉夫自古及今好者億人廣求名藥與江湖藝客往來盡費家財使兄弟妻子離散乃至終身訖不諧遇而舉世希有能成何也蓋其入門差錯而與道乖殊不遇明師而未燭厥理故也如審遭逢睹其端緒以類相況揆物終始旁門小術其法繁難易遇而難成金丹大道其法簡易難遇而易成如審遭逢睹其端緒即物類以相況揆物理之終始則天地之間形生氣化洪纖高下有情無情頭頭是道皆可觸類而長之也有如鶴鳴夜半雞唱五更其故何也蓋與天地之氣相應也他如寒蟬之吸風犀牛之望星老蚌之含月頑石之懷玉蝶翅之開闔螢焰之明滅猫睛之舒斂鹿尾之逆運龜之納息鱉之射影風袋之鼓風水滴之吸水磁石之引針琥珀之拾芥桔槔轆轤之運水菖蒲稻花之凝露蛇之入蟄魚之在水蜣蜋之轉丸蠮螉之呪子雞之抱卵兔之懷胎牛之有黃龍之有珠梅核之生仁甜瓜之脫蒂與夫芭蕉春風之機梧桐秋雨之祕碧潭之夜月青山之暮雲無非金丹法象張紫陽謂鍊金丹者須洞曉陰陽深達造化豈不信哉五行相克更為父母母含滋液父主禀與丹法之要莫大乎五行五行之妙無出於坎離坎為水金水合處而水中有金離為火木火為侣而火中有木是為四象加以坎納戊土離納已土是為五行悟真篇云震龍汞出自離鄉兌虎鉛生在坎方二物總因兒産母五行全要入中央又云離坎若還無戊己雖含四象不成丹只緣彼此懷真土遂使金丹有返還其說明矣丹法以火鍊金以金伐木火盛則水沃之水盛則土遏之是謂五行相克金生水水乃金之子而水中生金木生火火乃木之子而火中生木是謂更為父母父猶天也母猶地也天氣降而至於地地受之而成生育之功故曰母含滋液父主禀與赤龍大丹訣云妙在天交地功能返與還翠虛篇云父精母血結胎成尚似他形似我形身內認吾真父母方才捉得五行精修鍊之士能以自己之天交自己之地以自己之五行攢簇於其內則相吞相啖却相親始覺無中有孕而結成聖胎也凝精流形金石不朽五行之精凝結於天地間或為金或為石歷千百載而不朽人能反身而求之以吾自己五行之精凝結成寶則將與天地相為無窮金石奚足多哉審專不泄得成正道專者謝絶人事一心修鍊念兹在兹而用志不分也不泄者終日默默如雞抱卵神若出便收來常在腔子之內也審如此則功夫純粹藥材不至銷耗火力不至間斷道乃成矣昧者惑於下術乃謂手按尾閭閉其淫泆感合之穢物謂之不泄不思精雖不泄神氣蓋已去矣徒留其底滯撓敗之物積於腰間以成奇僻之疾何其昧也如此楞嚴經云若不斷淫修禪定者如蒸沙石欲其成飯經百千劫只名熱沙況此金丹大道以性命兼修宜如何耶翠虛篇云若欲延年救老殘斷除淫欲行旁門果將留形永住世除非運火鍊神丹學者其審思之立竿見影呼谷傳響豈不靈哉天地至象立竿而影見呼谷而響傳蓋未有感而不應者也乃若日月懸象於當天取火則火生取水則水至感應如此其速豈不至靈也哉然天下莫不見而莫能知也翠虛篇云日烏月兔兩輪圓根在先天採取難月夜望中能採取天魂地魄結靈丹學者誠能盜天地之機於日月相望之夜以自己日月交光於中央則內真外應丹自來而和他日月被烹煎矣若以野葛一寸巴豆一兩入喉輒僵不得俯仰當此之時雖周文揲蓍孔子占象扁鵲操針巫咸扣鼓安能令蘇復起馳走野葛巴豆草藥中之至毒者也若以野葛啖至一寸巴豆服至一兩即時僵仆雖周文孔子為之揲蓍占象扁鵲巫咸為之操針扣鼓亦不能使之復蘇矣然而今人但信毒藥入口能使人速死而不信靈丹入口能使人長生是何不思之甚歟河上姹女靈而最神見火則飛不見埃塵鬼隱龍匿莫知所存將欲制之黃芽為根真汞産於離離為女居午以分野言之午為三河故稱河上姹女究其所從來蓋由虛心凝神而得之實自心中出是以謂之靈汞又謂之神汞其性猛烈見火則飛走無蹤猶如鬼隱龍匿莫知所存非用黃芽為根何以制之黃芽即真鉛也汞得真鉛擒制交結然後不能飛走此所以用之為金丹之根也物無陰陽違天背原牝雞自卵其雛不全夫何故乎配合未連三五不交剛柔離分一陰一陽謂之道偏陰偏陽謂之疾譬之牝雞不牡而自卵則其無雛必矣何者獨陽不生獨陰不成也悟真篇云莫把孤陰為有陽獨修一物轉羸尫勞形引按已非道鍊氣餐霞更是狂舉世謾求金汞伏何時得見虎龍降勸君窮取生身處返本還源是藥王人能回光返照以吾自己陰陽交媾於內則剛柔配合三五歸一何必他求還源篇云自家燮理內陰陽玉芝書云陰陽非採他人物還丹篇云陰陽須採自家真豈可外吾身而求之他哉翠虛篇云寧可求師安樂法不可邪淫採精血古云天地悉皆歸須學無為清靜訣蓋金丹者清靜無為之道也或者溺於邪僻之說以為金丹必用婦人惑之甚矣施化之道天地自然猶火動而炎上水流而潤下非有師導使其然者資始統政不可復改天地之施化水火之炎潤此豈人力使之乃自然而然爾吾身自有天地自有水火其施化炎潤亦豈人力使之皆不過自然而然爾指玄篇云必知會合東西路切在沖和上下田蓋人之一身法天象地首即天也腹即地也但潛神內守而勿忘勿助調勻鼻息而勿縱勿拘自然一闔一闢一禀一受與天地施化之道無異若夫時至氣化機動籟鳴則火從臍下發水向頂中生其妙自有不期然而然者初不在勞神用力而後得也是道也乃天造地設一定而不可易者也魏公恐學者不明身中之陰陽上下遂以天地之施化水火之炎潤為喻可謂詳且明矣觀夫雌雄交媾之時剛柔相結而不可解得其節符非有工巧以制御之全真集云氣調神定呼交媾翠虛篇云譬如夫婦交媾時一㸃精血結成嬰蓋金丹之所謂交媾乃陰陽內感神氣交結曰雌雄曰夫婦皆譬喻也還源篇云神氣歸根處身心復命時這般真孔竅料得少人知當其神入氣中氣與神合得其節符真有剛柔相結而不可解之狀又豈有工巧以制御之但見其然而然吾亦不知其所以然而然妙哉妙哉若男生而伏女偃其軀禀乎胞胎受氣之初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交媾定制始先儲華谷袪疑說云闢氣為男闔氣為女一闔一闢男女攸分李玉溪注心印經云男女禀受同也但感合先後而分陰陽爾蓋陽氣聚面故男子面重生時必伏陰氣聚背故女子背重生時必仰豈獨生時為然其死也亦然故男子溺死必伏女子溺死必仰走獸溺死伏仰皆然此豈父母教其若是蓋於受氣之初一闢一闔一先一後已定之也今魏公講明清靜之道乃及於男女之伏仰何也曰無他欲學者洞明吾身之陰陽上下而知造化自然之理而已坎男為月離女為日日以施德月以舒光日改月化體不虧傷陽失其契陰侵其明晦朔薄蝕奄冒相包陽消其形陰凌生灾乾之中爻交於坤而成坎於是坎為中男坤之中爻交於乾而成離於是離為中女然則離本乾體其中爻乃坤畫陽中有陰故有日之象坎本坤體其中爻乃乾畫陰中有陽故有月之象悟真篇云離居日位反為女坎配蟾宫却是男不會箇中顛倒意休將管見事高談此蓋身中之陰陽顛倒學者誠未可以淺見窺也夫日以施德夫道也月以舒光婦道也今以月為坎男則是婦為男矣以日為離女則是夫為女矣此其為顛倒也而所以日改月化體不虧傷者由陰陽之相資也夫日月之食數之交也日望月則月食月掩日則日食是故日食於朔月食於望然而有食有不食者交則食不交則不食也今魏公舉日月二者比喻丹道而拳拳於晦朔薄蝕其意蓋有在矣學者得不回光返照尋吾身中之日月求吾身中之晦朔哉上清集云因看斗柄運周天頓悟神仙妙訣一㸃真陽生坎位㸃却離宫之缺自古乾坤這些離坎日月無休歇今年冬至梅花依舊凝雪先聖此日閉關不通來往皆為群生設物物總含生育意正在子初亥末造物無聲水中起火妙在虛危穴如今識破金烏飛入蟾窟如此直指天機顯陳道要益足證魏公之言昭昭乎不我欺也男女相須含吐以滋雌雄錯雜以類相求男女雌雄皆吾身中陰陽二物也二物氣類相得自然一吐一含交結成胎上清集云自家身裏有夫妻說向時人須笑殺是道也學者當以清靜無為求之不可以邪見喻也金化為水水性周章火化為土水不得行金生於坎宫氣而已矣蓋未化為水也因太陽真火伏蒸於其下遂鎔化為水水性周章沛然孰能禦之然火勢既極則又化而為土火化為土則土尅水水見土則止故不得行也故男動外施女靜內藏溢度過節為女所拘魄以鈐魂不得淫奢入藥鏡云水能流火能焰在身中自可驗是故調和鉛汞要成丹不可溢度過節今夫坎男動而施於外離女靜而藏於內一或溢度過節則離女從而拘鈐之庶幾魂魄相制而不致乎淫奢也不寒不暑進退合時各得其和俱吐證符採藥時調火功不得疾不得緩但欲其和平而交媾爾復命篇云剛柔相會氣均勻妙在無傷兊震大要以和為貴也丹砂木精得金乃并元陽子大道歌云欲識丹砂是木精移來西位與金并蓋汞性飛走最難降伏惟投入於鉛爐之內與鉛相合然後不飛不走也金水合處木火為侣四者渾沌列為龍虎龍陽數奇虎陰數耦天一生水位居北其象為玄武地二生火位居南其象為朱雀天三生木位居東其象為青龍地四生金位居西其象為白虎四者各居一方各為一象本不相涉也今曰金水合處木火為侣者陽龍元自離宫出陰虎還從坎位生也夫既各為一象則當舉四象而並稱之今乃不言朱雀玄武而獨以龍虎言之者南北為經東西為緯也夫所謂金水合處者以西四白虎之金降入水中也木火為侣者以東三青龍之木升入火中也此所以金不在西而與水合處於北木不在東而與火為侣於南白虎變為黑虎青龍化為赤龍也蓋金水木火之四者聚而為一則渾渾沌沌如太極之未分列而為二則震龍汞出自離鄉兌虎鉛生在坎方張紫陽深得其旨遂一言以蔽之曰四象不離二體後之學者不知四象果為何物或以眼耳鼻舌為四象或以肝肺為龍虎體認既差源流益别又安識四象不離二體之妙哉肝青為父肺白為母心赤為女脾黃為祖腎黑為子子五行始三物一家都歸戊己翠虛篇云肝心脾肺腎腸膽盡是空屋舊藩籬唾涕精津氣血液只可接助為階梯謂金丹乃無中生有之妙道非有形有質之物所可為也今魏公乃以五臟言何也曰非用五臟也特借五臟以比喻五行爾蓋肝青脾白言金木也心赤腎黑言水火也金生水木生火故以肝肺為父母心腎為子女而金木二者又從土中生故以脾為祖也夫既腎為子矣而以為五行之始何也曰腎屬水水數一一日之氣起於子生於腎然後傳及肝心脾肺也然而肝心脾肺腎之五者不名為五臟而名為三物又何也曰金水合處木火為侣與中央戊己之土合而成三也蓋四象五行全藉土若無戊己不成丹此其所以三物一家都歸戊己也剛柔迭興更歷分部龍西虎東建緯卯酉刑德並會相見歡喜刑主殺伏德主生起二月榆死魁臨於卯八月麥生天罡據酉子南午北互為綱紀剛柔迭興者二氣相資運轉也更歷分部者周流經歷諸辰也龍西虎東建緯卯酉刑德並會相見歡喜者象緯一動而卯酉相加金木不間隔也刑主殺伏者沉歸海底如秋氣肅殺斂萬物以入也德主生起者般上南溟如春氣發生暢萬物以出也二月榆死魁臨於卯者二月建卯而月將為河魁河魁屬戌而戌中有辛榆死於此月由辛金之殺氣臨於卯也八月麥生天罡據酉者八月建酉而月將為天罡天罡屬辰而辰中有乙麥生於此月由乙木之生氣據於酉也子南午北互為綱紀者日行西陸謂之春而二月卯時西陸在東北陸在南日行東陸謂之秋而八月酉時東陸在西南陸在北也蓋南北為天地之經東西為天地之緯鼎中魁罡一轉則龍走西而虎走東子在南而午在北與二八月卯酉之造化無異故悟真篇謂兔雞之月及其時刑德臨門藥象之也象也者像此者也魏公設此象以示人其理儘自明白奈何執文泥象者往往只就紙上搜索更不去身中尋思於是迷迷相引而無有出期殊不知魏公所謂龍西虎東子南午北即吾身之天地反覆也若能曉悟吾身天地反覆之妙則東西之所以建緯南北之所以互為綱紀皆可默會其機矣又何用區區向外尋也哉一九之數終而復始一九之數即戴九履一之數也終而復始者自一而九自九而一往來上下周流不息也含元虛危播精於子含元虛危者日到虛危夜夜同而元氣胚胎於此也播精於子者子時氣到尾閭關而真精至此而生也金丹之妙含元於先天播精於後天何謂先天寂然不動窈窈冥冥太極未判之時是也何謂後天感而遂通恍恍惚惚太極已判之時是也先天惟一氣爾後天然後化為真精也翠虛篇云半斤真汞半斤鉛産在虛無太極先須趁子時當採取鍊成金液入丹田其說是已蓋所謂虛危者亥子之間陰極陽生之時也子時者一陽動處是也過此以往則有一子母分胎路妙在尾箕牛斗女非洞曉吾身之陰陽深達天地之造化疇克知此哉關關雎鳩在河之洲窈窕淑女君子好逑雄不獨處雌不孤居玄武龜蛇蟠虯相扶以明牝牡竟當相須假使二女共室顔色甚姝令蘇秦通言張儀結媒發辨利舌奮舒美辭推心調諧合為夫妻弊髮腐齒終不相知若藥物非種名類不同分劑參差失其紀綱雖黃帝臨爐大乙執火八公搗鍊淮南調合立宇崇壇玉為階陛麟脯鳳臘把籍長跪禱祝神祇請哀諸鬼沐浴齊戒妄有所翼亦猶和膠補釜以硇塗瘡去冷加冰除熱用湯飛龜舞蛇愈見乖張金丹大道一陰一陽而已參之人事物理莫不皆然今魏公取關雎淑女配君子之義以喻身中男女之相匹又取玄武龜蛇蟠虯之義以喻身中牝牡之相須可謂廣譬曲喻纖悉不遺矣且如兌女艮男上下感應以相與則謂之咸離兌二女固居其志不同行則謂之睽以明陰陽貴乎相得不可以一偶也乃若爐火煆鍊之事亦必陰陽兩齊儻藥物非其種類分兩失其紀綱雖黃帝臨爐太乙執火八公淮南搗鍊調合金玉以為壇陛麟鳳以為脯臘齊戒沐浴把籍長跪陳青詞拜朱章禱爾于上下神祇吾見其廢時亂日勞而無功猶如和膠泥以補破釜以硇砂而塗惡瘡與夫去冷而加冰除熱而用湯飛龜舞蛇愈見乖張矣或泥雄不獨處雌不孤居之說謂修丹不用婦人則為寡陽遂妄引此章以證其邪僻之謬論而反笑正道之迂闊多見其不知量也周易參同契發揮卷之七
